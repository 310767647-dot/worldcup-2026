<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="2026世界杯实时比分、赛程、积分榜、球员统计和视频回放">
  <meta name="keywords" content="2026世界杯,世界杯实时战报,世界杯赛程,世界杯积分榜,球员统计,进球视频">
  <meta property="og:title" content="2026世界杯实时战报中心">
  <meta property="og:description" content="2026世界杯实时比分、赛程、积分榜、球员统计和视频回放">
  <meta property="og:type" content="website">
  <title>2026 世界杯实时战报中心</title>
  <style>
    :root {
      --ink: #f8fbff;
      --muted: #a9b8d6;
      --dim: #6f819f;
      --panel: rgba(8, 22, 48, .82);
      --panel-strong: rgba(5, 15, 35, .96);
      --line: rgba(255,255,255,.13);
      --green: #16b879;
      --red: #e02038;
      --blue: #2f80ff;
      --gold: #f4c86a;
      --navy: #061126;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin:0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 78% 0%, rgba(47,128,255,.24), transparent 34%),
        radial-gradient(circle at 12% 5%, rgba(224,32,56,.18), transparent 30%),
        linear-gradient(180deg, #07132a 0%, #07111f 58%, #061126 100%);
      color: var(--ink);
      min-height: 100vh;
      letter-spacing: 0;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      background: rgba(4, 12, 28, .84);
      border-bottom:1px solid var(--line);
    }
    .nav {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 18px;
      white-space: nowrap;
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: conic-gradient(from 40deg, var(--red), var(--gold), var(--green), var(--blue), var(--red));
      box-shadow: 0 0 30px rgba(47,128,255,.35);
      flex: 0 0 auto;
    }
    .nav-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    button, input, select {
      font: inherit;
    }
    .nav button, .control button {
      border:1px solid var(--line);
      color: var(--ink);
      background: rgba(255,255,255,.06);
      padding: 9px 13px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .nav button.active, .control button.active {
      background: linear-gradient(135deg, var(--red), var(--blue));
      border-color: transparent;
    }
    main { max-width: 1240px; margin: 0 auto; padding: 28px 22px 60px; }
    .hero {
      min-height: 500px;
      display: grid;
      grid-template-columns: minmax(0, .88fr) minmax(390px, 1.12fr);
      gap: 26px;
    }
    @media (max-width: 900px) {
      .hero { grid-template-columns: minmax(0, 1fr); }
    }
    .hero-board {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
    }
    .hero-tile {
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: 14px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hero-tile span { color: var(--muted); font-size: 13px; }
    .hero-tile b { font-size: 18px; }
    .hero-tile small { color: var(--dim); font-size: 12px; }
    .metric-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin: 22px 0;
    }
    .metric {
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }
    .metric b { display: block; font-size: 28px; }
    .metric span { color: var(--muted); font-size: 13px; }
    .control {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin: 18px 0;
    }
    input[type="text"], select {
      padding: 9px 13px;
      border-radius: 8px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--ink);
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }
    .match-card {
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
    }
    .match-meta { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    .scoreline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .score { letter-spacing: 2px; }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .pill.live { background: rgba(224,32,56,.18); color: var(--red); }
    .pill.finished { background: rgba(22,184,121,.18); color: var(--green); }
    .pill.scheduled { background: rgba(47,128,255,.18); color: var(--blue); }
    .venue { color: var(--dim); font-size: 13px; margin-top: 8px; }
    .table-wrap {
      overflow-x: auto;
      margin: 18px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th {
      background: var(--panel-strong);
      padding: 12px 14px;
      text-align: left;
      font-weight: 700;
      border-bottom:1px solid var(--line);
    }
    td {
      padding: 10px 14px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    tr:hover { background: rgba(255,255,255,.03); }
    .leader-board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .leader {
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .empty {
      color: var(--dim);
      padding: 40px;
      text-align: center;
    }
    h2 { font-size: 22px; margin: 28px 0 14px; }
    h3 { font-size: 17px; margin: 18px 0 10px; }
    #refreshState { color: var(--dim); font-size: 12px; }
    #countdownTimer { color: var(--gold); font-size: 12px; margin-left: 4px; }
    .skip-link {
      position: absolute;
      top: -40px;
      left: 10px;
      background: var(--panel-strong);
      color: var(--ink);
      padding: 8px 14px;
      border-radius: 6px;
      z-index: 100;
    }
    .skip-link:focus { top: 10px; }
    /* 视频直播样式 */
    .section-head { margin-bottom: 18px; }
    .section-note { color: var(--dim); font-size: 13px; margin-top: 6px; }
    .video-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
      margin-top: 18px;
    }
    @media (max-width: 900px) {
      .video-layout { grid-template-columns: 1fr; }
    }
    .video-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
    }
    .video-window {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      margin: 12px 0;
    }
    .video-window iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-meta { color: var(--dim); font-size: 13px; margin-top: 8px; }
    .video-list {
      max-height: 400px;
      overflow-y: auto;
      margin-top: 12px;
      padding-right: 8px;
    }
    .video-list-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.2s;
    }
    .video-list-item:hover { background: rgba(255,255,255,.06); }
    .video-list-item.active { background: rgba(47,128,255,.15); }
    .source-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .source-modal[aria-hidden="false"] { display: flex; }
    .source-dialog {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      max-width: 680px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .source-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .source-close {
      background: none;
      border: none;
      color: var(--ink);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .source-item {
      padding: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .source-item:hover { background: rgba(47,128,255,.2); border-color: var(--blue); }
    .source-note { color: var(--dim); font-size: 12px; margin-top: 16px; text-align: center; }
    /* 球员统计样式 */
    .player-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .player-card {
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .player-rank {
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      min-width: 32px;
      text-align: center;
    }
    .player-info { flex: 1; }
    .player-name { font-weight: 700; font-size: 15px; }
    .player-team { color: var(--muted); font-size: 12px; }
    .player-stat { color: var(--blue); font-size: 18px; font-weight: 700; }
    .player-stat-label { color: var(--dim); font-size: 11px; }
    /* 进球视频样式 */
    .goal-video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .goal-video-card {
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    .goal-video-thumb {
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
      position: relative;
      cursor: pointer;
    }
    .goal-video-thumb-inner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: rgba(0,0,0,.5);
      transition: background .2s;
    }
    .goal-video-thumb-inner:hover { background: rgba(47,128,255,.3); }
    .goal-video-info { padding: 12px 16px; }
    .goal-video-match { font-size: 13px; color: var(--muted); }
    .goal-video-player { font-weight: 700; margin: 4px 0; }
    .goal-video-minute { font-size: 12px; color: var(--dim); }
    .tab-bar {
      display: flex;
      gap: 4px;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 8px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.06);
      color: var(--ink);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all .2s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--red), var(--blue));
      border-color: transparent;
    }
    .highlight-match {
      background: rgba(47,128,255,.08);
      border-color: var(--blue);
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">跳转到主要内容</a>

  <header>
    <nav class="nav" aria-label="主导航">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <span>2026 世界杯战报中心</span>
      </div>
      <div class="nav-actions">
        <button type="button" data-jump="focus">焦点</button>
        <button type="button" data-jump="matches">赛程</button>
        <button type="button" data-jump="standings">积分榜</button>
        <button type="button" data-jump="players">球员统计</button>
        <button type="button" data-jump="goalvideos">进球视频</button>
        <button type="button" data-jump="videos">视频直播</button>
        <button type="button" id="refreshBtn">刷新数据</button>
        <span id="refreshState"></span>
        <span id="countdownTimer"></span>
      </div>
    </nav>
    <div id="data-source-indicator" style="display:none; padding:6px 22px; font-size:11px; color:var(--dim); background:rgba(255,255,255,.03); border-bottom:1px solid var(--line);">
      &#x1F4E1; 数据来源: <span id="data-source-text">加载中...</span>
      <span id="data-update-time" style="margin-left:12px;"></span>
      <span id="auto-refresh-info" style="margin-left:12px;color:var(--gold);"></span>
    </div>
  </header>

  <main id="main-content">
    <div id="leadText" style="color:var(--dim);font-size:13px;margin-bottom:18px;"></div>

    <div class="hero">
      <section>
        <h2>实时战报</h2>
        <div id="heroBoard" class="hero-board"></div>

        <div id="hotspot" style="margin-top:22px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;">
          <h3 id="hotspotTitle"></h3>
          <p id="hotspotBody"></p>
          <div id="hotspotChips" style="margin-top:10px;"></div>
        </div>
      </section>

      <section>
        <h2>数据概览</h2>
        <div id="metrics" class="metric-bar"></div>

        <h2>次日赛程</h2>
        <div id="tomorrowNote" style="color:var(--muted);font-size:13px;margin-bottom:10px;"></div>
        <div id="tomorrowGrid" class="grid"></div>
      </section>
    </div>

    <section id="focus">
      <h2>焦点比赛</h2>
      <div id="focusGrid" class="grid"></div>
    </section>

    <section id="videos">
      <div class="section-head">
        <div><h2>赛事视频直播与回放</h2><div class="section-note">直播窗口支持选择未来比赛；未开赛前可观看前一天进球集锦；完赛比赛可选择回放来源观看。</div></div>
      </div>
      <div class="video-layout">
        <div class="video-panel">
          <h3>现场直播窗口</h3>
          <div class="control">
            <select id="liveMatchSelect"><option value="">自动选择（进行中比赛优先）</option></select>
            <button type="button" id="refreshLiveBtn" style="font-size:12px;padding:6px 12px;">刷新列表</button>
          </div>
          <div class="video-window" id="liveVideoWindow"></div>
          <div class="video-meta" id="liveVideoMeta"></div>
          <div class="video-list" id="liveHighlightsList"></div>
        </div>
        <div class="video-panel">
          <h3>完赛视频回放</h3>
          <div class="control">
            <select id="replaySelect"><option value="">选择已完赛比赛</option></select>
            <button type="button" id="searchReplayBtn" style="font-size:12px;padding:6px 12px;">搜索回放</button>
          </div>
          <div class="video-window" id="replayVideoWindow"></div>
          <div class="video-meta" id="replayVideoMeta"></div>
          <div class="video-list" id="replayList"></div>
        </div>
      </div>
    </section>

    <section id="matches">
      <h2>全部赛程</h2>
      <div class="control">
        <input type="text" id="searchBox" placeholder="搜索球队、球场..." aria-label="搜索比赛">
        <select id="statusFilter" aria-label="筛选状态">
          <option value="">全部状态</option>
        </select>
        <select id="groupFilter" aria-label="筛选小组">
          <option value="">全部小组</option>
        </select>
        <select id="dateFilter" aria-label="筛选日期">
          <option value="">全部日期</option>
        </select>
        <button type="button" id="resetFilters">重置筛选</button>
      </div>
      <div id="matchGrid" class="grid"></div>
    </section>

    <section id="players">
      <h2>球员统计</h2>
      <div class="tab-bar" id="playerTabs">
        <button class="tab-btn active" data-tab="scorers">射手榜</button>
        <button class="tab-btn" data-tab="assists">助攻榜</button>
        <button class="tab-btn" data-tab="cards">红黄牌榜</button>
      </div>
      <div id="playerStatsContainer" class="player-stats-grid"></div>
    </section>

    <section id="goalvideos">
      <h2>进球视频集锦</h2>
      <div class="control">
        <select id="goalVideoMatchFilter" aria-label="按比赛筛选">
          <option value="">全部比赛</option>
        </select>
      </div>
      <div id="goalVideoGrid" class="goal-video-grid"></div>
      <div id="goalVideoEmpty" class="empty" style="display:none;">暂无进球视频数据。</div>
    </section>

    <section id="standings">
      <h2>积分榜</h2>
      <div id="leaders" class="leader-board"></div>
      <div id="standingsTable" class="table-wrap"></div>
    </section>

    <section id="discipline">
      <h2>红黄牌记录</h2>
      <div id="disciplineTable" class="table-wrap"></div>
    </section>
  </main>

  <footer style="text-align:center;color:var(--dim);font-size:12px;padding:30px 22px;border-top:1px solid var(--line);margin-top:40px;">
    本页面为2026世界杯实时战报中心，数据来源于FIFA官方及ESPN公开数据，仅供参考。自动刷新间隔：15分钟。
  </footer>

  <!-- 来源弹窗 -->
  <div class="source-modal" id="sourceModal" aria-hidden="true" role="dialog" aria-label="视频来源选择">
    <div class="source-dialog">
      <div class="source-head">
        <div>
          <h3 id="sourceTitle" style="margin:0;"></h3>
          <div id="sourceSubtitle" style="color:var(--dim);font-size:13px;"></div>
        </div>
        <button class="source-close" id="sourceClose" aria-label="关闭">&times;</button>
      </div>
      <div class="source-grid" id="sourceGrid"></div>
      <div class="source-note">以上为第三方视频平台链接，点击将在新窗口打开。</div>
    </div>
  </div>

    // ============ 数据处理 ============
    let DATA = null;
    let dataSource = '内联数据';

    async function loadDataFromNetwork() {
      const log = (msg) => { if (DATA_CONFIG.debug) console.log(`[数据] ${msg}`); };
      try {
        log(`从API加载: ${DATA_CONFIG.apiUrl}`);
        const response = await fetch(`${DATA_CONFIG.apiUrl}?t=${Date.now()}`, {
          cache: 'no-store',
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          const data = await response.json();
          log('API加载成功');
          return data;
        }
      } catch (err) {
        log(`API失败: ${err.message}`);
      }
      try {
        log(`从备用地址加载: ${DATA_CONFIG.fallbackUrl}`);
        const response = await fetch(`${DATA_CONFIG.fallbackUrl}?t=${Date.now()}`, {
          cache: 'no-store',
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          const data = await response.json();
          log('备用地址加载成功');
          return data;
        }
      } catch (err) {
        log(`备用地址失败: ${err.message}`);
      }
      return null;
    }

    function processData(rawData) {
      if (rawData.matches) {
        rawData.matches.sort((a, b) => new Date(a.time) - new Date(b.time));
      }
      if (rawData.standings) {
        rawData.standings.sort((a, b) => {
          if (b.points !== a.points) return b.points - a.points;
          return b.goalDifference - a.goalDifference;
        });
      }
      // 确保中文数据
      if (rawData.matches) {
        rawData.matches.forEach(m => {
          m.home = zhName(m.home);
          m.away = zhName(m.away);
          if (m.venue) m.venue = zhVenue(m.venue);
        });
      }
      if (rawData.standings) {
        rawData.standings.forEach(s => {
          s.team = zhName(s.team);
        });
      }
      if (rawData.discipline) {
        rawData.discipline.forEach(d => {
          d.team = zhName(d.team);
        });
      }
      if (rawData.playerStats) {
        ['scorers','assists'].forEach(k => {
          if (rawData.playerStats[k]) {
            rawData.playerStats[k].forEach(p => { p.team = zhName(p.team); });
          }
        });
      }
      return rawData;
    }

    async function initData() {
      const networkData = await loadDataFromNetwork();
      if (networkData) {
        DATA = processData(networkData);
        dataSource = '网络数据';
      } else {
        DATA = processData(JSON.parse(JSON.stringify(INLINE_DATA)));
        dataSource = '内联备用数据';
      }
      updateDataSourceIndicator();
      renderAll();
      setupAutoRefresh();
      setupCountdown();
    }

    function updateDataSourceIndicator() {
      const indicator = document.getElementById('data-source-indicator');
      const text = document.getElementById('data-source-text');
      const time = document.getElementById('data-update-time');
      const auto = document.getElementById('auto-refresh-info');
      if (indicator && text) {
        text.textContent = dataSource;
        indicator.style.display = 'block';
        if (time && DATA && DATA.meta && DATA.meta.generatedAt) {
          time.textContent = '更新时间: ' + DATA.meta.generatedAt;
        }
        if (auto) {
          auto.textContent = '每15分钟自动刷新';
        }
      }
    }

    // ============ 15分钟自动刷新 + 倒计时 ============
    let refreshTimer = null;
    let countdownTimer = null;

    function setupAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(async () => {
        const newData = await loadDataFromNetwork();
        if (newData) {
          DATA = processData(newData);
          dataSource = '网络数据（自动刷新）';
          updateDataSourceIndicator();
          renderAll();
          if (DATA_CONFIG.debug) console.log('[自动刷新] 数据已更新');
        }
        resetCountdown();
      }, DATA_CONFIG.autoRefreshInterval);
    }

    function setupCountdown() {
      resetCountdown();
    }

    function resetCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      let remaining = Math.floor(DATA_CONFIG.autoRefreshInterval / 1000);
      const el = document.getElementById('countdownTimer');
      countdownTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) remaining = Math.floor(DATA_CONFIG.autoRefreshInterval / 1000);
        const min = Math.floor(remaining / 60);
        const sec = remaining % 60;
        if (el) el.textContent = `下次刷新: ${min}:${String(sec).padStart(2,'0')}`;
      }, 1000);
    }

    // ============ 工具函数 ============
    const $ = (id) => document.getElementById(id);
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }
    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }
    function signed(value) {
      const num = Number(value || 0);
      return num > 0 ? `+${num}` : String(num);
    }

    function matchCard(m) {
      const score = m.completed ? `${m.homeScore ?? ''}:${m.awayScore ?? ''}` : 'VS';
      const statusClass = m.live ? 'live' : (m.completed ? 'finished' : 'scheduled');
      return `<article class="match-card ${m.live ? 'live' : ''}">
        <div class="match-meta"><span>${escapeHtml(m.time || '时间待定')}</span><span>${escapeHtml([m.stage, m.group].filter(Boolean).join(' · '))}</span></div>
        <div class="scoreline"><span class="team">${escapeHtml(m.home)}</span><strong class="score">${escapeHtml(score)}</strong><span class="team">${escapeHtml(m.away)}</span></div>
        <div><span class="pill ${statusClass}">${escapeHtml(m.status || '待定')}</span></div>
        <div class="venue">球场：${escapeHtml(m.venue || '待定')}</div>
      </article>`;
    }

    // ============ 渲染函数 ============
    function renderAll() {
      if (!DATA) return;

      $('leadText').textContent = '数据日期：' + DATA.meta.reportDate + '。生成时间：' + DATA.meta.generatedAt + '。时区：北京时间。';

      // 热点
      $('hotspotTitle').textContent = DATA.hotspot.title;
      $('hotspotBody').textContent = DATA.hotspot.body;
      $('hotspotChips').innerHTML = (DATA.hotspot.chips || []).map(label => '<span class="pill" style="margin-right:6px;">' + escapeHtml(label) + '</span>').join('');

      // 指标
      const m = DATA.metrics;
      $('metrics').innerHTML = [
        ['累计比赛', m.totalMatches],
        ['已完赛', m.completedMatches],
        ['进行中', m.liveMatches],
        ['积分记录', m.standingsRows],
        ['红黄牌', m.disciplineEvents],
        ['次日赛事', m.tomorrowFixtures],
      ].map(([label, value]) => '<div class="metric"><b>' + value + '</b><span>' + label + '</span></div>').join('');

      // Hero板块
      const latest = [...DATA.matches].filter(m => m.completed).sort((a, b) => String(b.time || '').localeCompare(String(a.time || '')))[0];
      const next = [...DATA.matches].filter(m => !m.completed).sort((a, b) => String(a.time || '').localeCompare(String(b.time || '')))[0];
      const leader = [...DATA.standings].sort((a, b) => b.points - a.points || b.goalDifference - a.goalDifference)[0];
      const tiles = [
        latest ? ['最近完赛', latest.home + ' ' + (latest.homeScore ?? '') + ':' + (latest.awayScore ?? '') + ' ' + latest.away, latest.time || '时间待定'] : ['最近完赛', '暂无完赛比分', '等待数据写入'],
        next ? ['下一场', next.home + ' vs ' + next.away, next.time || '时间待定'] : ['下一场', '暂无待赛赛程', '等待数据写入'],
        leader ? ['积分领跑', leader.team + ' ' + leader.points + '分', leader.group + ' · 净胜球 ' + signed(leader.goalDifference)] : ['积分领跑', '暂无积分数据', '等待数据写入'],
      ];
      $('heroBoard').innerHTML = tiles.map(([label, title, detail]) => '<div class="hero-tile"><span>' + escapeHtml(label) + '</span><b>' + escapeHtml(title) + '</b><small>' + escapeHtml(detail) + '</small></div>').join('');

      // 次日赛程
      const tomorrow = DATA.matches.filter(m => !m.completed && m.date === DATA.meta.tomorrowDate);
      $('tomorrowNote').textContent = '次日赛程日期：' + DATA.meta.tomorrowDate;
      $('tomorrowGrid').innerHTML = tomorrow.length ? tomorrow.map(matchCard).join('') : '<div class="empty">暂无次日赛程。</div>';

      // 焦点比赛
      const focus = DATA.matches.filter(m => m.live || m.date === DATA.meta.reportDate);
      $('focusGrid').innerHTML = focus.length ? focus.map(matchCard).join('') : DATA.matches.slice(0, 4).map(matchCard).join('');

      // 全部赛程
      renderMatches();

      // 积分榜 - 领跑者
      const leaders = [...DATA.standings].sort((a, b) => b.points - a.points || b.goalDifference - a.goalDifference).slice(0, 6);
      $('leaders').innerHTML = leaders.map(row => 
        '<div class="leader"><b>' + escapeHtml(row.team) + '</b><span>' + escapeHtml(row.group) + ' · ' + row.points + '分 · 净胜球 ' + signed(row.goalDifference) + '</span></div>'
      ).join('');

      // 积分榜 - 完整表格
      const rows = [...DATA.standings].sort((a, b) =>
        String(a.group).localeCompare(String(b.group), 'zh-CN') || b.points - a.points || b.goalDifference - a.goalDifference
      );
      $('standingsTable').innerHTML = '<table><thead><tr>' +
        '<th>小组</th><th>球队</th><th>场次</th><th>胜</th><th>平</th><th>负</th><th>进球</th><th>失球</th><th>净胜球</th><th>积分</th>' +
        '</tr></thead><tbody>' + rows.map(r => '<tr><td>' + escapeHtml(r.group) + '</td><td>' + escapeHtml(r.team) + '</td><td>' + r.played + '</td><td>' + r.won + '</td><td>' + r.drawn + '</td><td>' + r.lost + '</td><td>' + r.goalsFor + '</td><td>' + r.goalsAgainst + '</td><td>' + signed(r.goalDifference) + '</td><td><strong>' + r.points + '</strong></td></tr>').join('') + '</tbody></table>';

      // 红黄牌
      $('disciplineTable').innerHTML = '<table><thead><tr>' +
        '<th>比赛ID</th><th>球队</th><th>球员</th><th>牌类</th><th>分钟</th><th>原因</th>' +
        '</tr></thead><tbody>' + DATA.discipline.map(r => '<tr><td>' + escapeHtml(r.matchId) + '</td><td>' + escapeHtml(r.team) + '</td><td>' + escapeHtml(r.player) + '</td><td><span class="pill ' + (String(r.card).includes('红') ? 'live' : 'scheduled') + '">' + escapeHtml(r.card) + '</span></td><td>' + escapeHtml(r.minute) + '</td><td>' + escapeHtml(r.reason || '-') + '</td></tr>').join('') + '</tbody></table>';

      // 筛选器
      const statuses = [...new Set(DATA.matches.map(m => m.status).filter(Boolean))].sort();
      const groups = [...new Set(DATA.matches.map(m => m.group).filter(Boolean))].sort();
      const dates = [...new Set(DATA.matches.map(m => m.date).filter(Boolean))].sort();
      
      fillSelect('statusFilter', statuses, '全部状态');
      fillSelect('groupFilter', groups, '全部小组');
      fillSelect('dateFilter', dates, '全部日期');

      $('refreshState').textContent = '已加载 ' + new Date().toLocaleTimeString('zh-CN', { hour12: false });

      // 球员统计
      renderPlayerStats('scorers');
      // 进球视频
      renderGoalVideos();
      // 视频直播/回放
      renderVideos();
    }

    function fillSelect(id, values, firstText) {
      const select = $(id);
      const current = select.value;
      select.innerHTML = '<option value="">' + firstText + '</option>' + values.map(v => '<option value="' + escapeAttr(v) + '">' + escapeHtml(v) + '</option>').join('');
      if (values.includes(current)) select.value = current;
    }

    function renderMatches() {
      const q = $('searchBox').value.trim().toLowerCase();
      const status = $('statusFilter').value;
      const group = $('groupFilter').value;
      const date = $('dateFilter').value;
      const rows = DATA.matches.filter(m => {
        const haystack = [m.home, m.away, m.venue, m.stage, m.group, m.status, m.time].join(' ').toLowerCase();
        return (!q || haystack.includes(q)) && (!status || m.status === status) && (!group || m.group === group) && (!date || m.date === date);
      });
      $('matchGrid').innerHTML = rows.length ? rows.map(matchCard).join('') : '<div class="empty">没有匹配的比赛。</div>';
    }

    // ============ 球员统计 ============
    function renderPlayerStats(tab) {
      const container = $('playerStatsContainer');
      if (!container) return;

      let data = [];
      if (tab === 'scorers' && DATA.playerStats && DATA.playerStats.scorers) {
        data = DATA.playerStats.scorers;
        container.innerHTML = data.map(p => 
          '<div class="player-card">' +
            '<div class="player-rank">' + p.rank + '</div>' +
            '<div class="player-info">' +
              '<div class="player-name">' + escapeHtml(p.player) + '</div>' +
              '<div class="player-team">' + escapeHtml(p.team) + ' · ' + p.matches + '场</div>' +
            '</div>' +
            '<div style="text-align:center;">' +
              '<div class="player-stat">' + p.goals + '</div>' +
              '<div class="player-stat-label">进球</div>' +
            '</div>' +
          '</div>'
        ).join('');
      } else if (tab === 'assists' && DATA.playerStats && DATA.playerStats.assists) {
        data = DATA.playerStats.assists;
        container.innerHTML = data.map(p => 
          '<div class="player-card">' +
            '<div class="player-rank">' + p.rank + '</div>' +
            '<div class="player-info">' +
              '<div class="player-name">' + escapeHtml(p.player) + '</div>' +
              '<div class="player-team">' + escapeHtml(p.team) + ' · ' + (p.matches||1) + '场</div>' +
            '</div>' +
            '<div style="text-align:center;">' +
              '<div class="player-stat">' + p.assists + '</div>' +
              '<div class="player-stat-label">助攻</div>' +
            '</div>' +
          '</div>'
        ).join('');
      } else if (tab === 'cards' && DATA.discipline) {
        const cardMap = {};
        DATA.discipline.forEach(d => {
          const key = d.player + '|' + d.team;
          if (!cardMap[key]) cardMap[key] = { player: d.player, team: d.team, yellow: 0, red: 0 };
          if (d.card.includes('红')) cardMap[key].red++;
          else cardMap[key].yellow++;
        });
        data = Object.values(cardMap).sort((a, b) => b.red - a.red || b.yellow - a.yellow).slice(0, 15);
        container.innerHTML = data.map((p, i) => 
          '<div class="player-card">' +
            '<div class="player-rank">' + (i + 1) + '</div>' +
            '<div class="player-info">' +
              '<div class="player-name">' + escapeHtml(p.player) + '</div>' +
              '<div class="player-team">' + escapeHtml(p.team) + '</div>' +
            '</div>' +
            '<div style="text-align:center;display:flex;gap:12px;">' +
              '<div><span style="color:var(--red);font-weight:700;">' + p.red + '</span><div class="player-stat-label">红牌</div></div>' +
              '<div><span style="color:var(--gold);font-weight:700;">' + p.yellow + '</span><div class="player-stat-label">黄牌</div></div>' +
            '</div>' +
          '</div>'
        ).join('');
      }
    }

    // ============ 进球视频 ============
    function renderGoalVideos(matchFilter) {
      const grid = $('goalVideoGrid');
      const empty = $('goalVideoEmpty');
      if (!grid) return;

      let videos = DATA.goalVideos || [];
      if (matchFilter) {
        videos = videos.filter(v => v.matchId === matchFilter);
      }

      // 更新筛选下拉
      const filterSelect = $('goalVideoMatchFilter');
      if (filterSelect && filterSelect.options.length <= 1) {
        const matches = [...new Set((DATA.goalVideos || []).map(v => v.match))];
        filterSelect.innerHTML = '<option value="">全部比赛</option>' +
          matches.map(m => '<option value="' + escapeAttr((DATA.goalVideos || []).find(v => v.match === m)?.matchId || '') + '">' + escapeHtml(m) + '</option>').join('');
      }

      if (videos.length === 0) {
        grid.innerHTML = '';
        if (empty) empty.style.display = 'block';
        return;
      }
      if (empty) empty.style.display = 'none';

      grid.innerHTML = videos.map(v => 
        '<div class="goal-video-card">' +
          '<div class="goal-video-thumb" onclick="searchGoalVideo(\'' + escapeAttr(v.query) + '\')">' +
            '<div class="goal-video-thumb-inner">⚽</div>' +
          '</div>' +
          '<div class="goal-video-info">' +
            '<div class="goal-video-match">' + escapeHtml(v.match) + '</div>' +
            '<div class="goal-video-player">' + escapeHtml(v.player) + ' (' + escapeHtml(v.team) + ')</div>' +
            '<div class="goal-video-minute">第' + escapeHtml(v.minute) + '分钟 · ' + escapeHtml(v.description) + '</div>' +
          '</div>' +
        '</div>'
      ).join('');
    }

    function searchGoalVideo(query) {
      const url = 'https://www.baidu.com/s?wd=' + encodeURIComponent(query + ' 世界杯 进球视频');
      window.open(url, '_blank');
    }

    // ============ 视频直播/回放 ============
    function renderVideos() {
      const liveMatchSelect = $('liveMatchSelect');
      const liveWindow = $('liveVideoWindow');
      const liveMeta = $('liveVideoMeta');
      const liveHighlights = $('liveHighlightsList');

      // 构建所有未开赛比赛的列表 + 进行中比赛
      const upcomingMatches = DATA.matches.filter(m => !m.completed && !m.live).slice(0, 10);
      const liveMatch = DATA.matches.find(m => m.live);

      // 填充直播选择下拉
      if (liveMatchSelect) {
        const currentVal = liveMatchSelect.value;
        let options = '<option value="">自动选择（进行中比赛优先）</option>';
        if (liveMatch) {
          options += '<option value="' + escapeAttr(liveMatch.id) + '" selected>' + escapeHtml(liveMatch.home) + ' vs ' + escapeHtml(liveMatch.away) + ' （进行中）</option>';
        }
        options += '<optgroup label="未来比赛">';
        upcomingMatches.forEach(m => {
          options += '<option value="' + escapeAttr(m.id) + '"' + (currentVal === m.id ? ' selected' : '') + '>' + escapeHtml(m.home) + ' vs ' + escapeHtml(m.away) + ' (' + escapeHtml(m.time) + ')</option>';
        });
        options += '</optgroup>';
        liveMatchSelect.innerHTML = options;
      }

      // 直播窗口
      if (liveMatch) {
        // 有进行中比赛
        if (liveWindow) {
          liveWindow.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#000;color:var(--ink);">' +
            '<div style="text-align:center;padding:20px;">' +
              '<div style="font-size:18px;font-weight:700;margin-bottom:12px;">⚽ ' + escapeHtml(liveMatch.home) + ' vs ' + escapeHtml(liveMatch.away) + '</div>' +
              '<div style="font-size:14px;color:var(--dim);margin-bottom:16px;">' + escapeHtml(liveMatch.time) + ' | ' + escapeHtml(liveMatch.venue) + '</div>' +
              '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
                '<button onclick="openVideoSource(\'' + escapeAttr(liveMatch.id) + '\', \'live\')" style="padding:10px 20px;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;">📡 观看直播</button>' +
                '<button onclick="searchMatchNews(\'' + escapeAttr(liveMatch.home) + '\', \'' + escapeAttr(liveMatch.away) + '\')" style="padding:10px 20px;background:rgba(255,255,255,.1);color:var(--ink);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:14px;">📋 比赛详情</button>' +
              '</div>' +
            '</div>' +
          '</div>';
        }
        if (liveMeta) {
          liveMeta.innerHTML = '<div style="color:var(--green);font-weight:700;">● LIVE 进行中</div>' +
            '<div>' + escapeHtml(liveMatch.home) + ' ' + (liveMatch.homeScore ?? 0) + ' : ' + (liveMatch.awayScore ?? 0) + ' ' + escapeHtml(liveMatch.away) + '</div>' +
            '<div style="color:var(--dim);font-size:12px;">' + escapeHtml(liveMatch.venue) + '</div>';
        }
      } else if (liveWindow) {
        // 没有进行中比赛 - 显示前一天进球集锦
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toISOString().split('T')[0];
        const yesterdayMatches = DATA.matches.filter(m => m.completed && m.date === yesterdayStr);

        if (yesterdayMatches.length > 0) {
          liveWindow.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#000;color:var(--ink);">' +
            '<div style="text-align:center;padding:20px;">' +
              '<div style="font-size:16px;font-weight:700;margin-bottom:12px;">暂无进行中的比赛</div>' +
              '<div style="font-size:13px;color:var(--dim);margin-bottom:16px;">可观看昨日（' + yesterdayStr + '）进球集锦</div>' +
              '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
                yesterdayMatches.map(m => '<button onclick="searchGoalVideo(\'' + escapeAttr(m.home + ' ' + m.away + ' goal highlights') + '\')" style="padding:8px 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;">' + escapeHtml(m.home) + ' vs ' + escapeHtml(m.away) + '</button>').join('') +
              '</div>' +
              '<div style="margin-top:12px;">' +
                '<button onclick="searchGoalVideo(\'World Cup 2026 highlights ' + yesterdayStr + '\')" style="padding:8px 16px;background:rgba(255,255,255,.1);color:var(--ink);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;">查看所有昨日集锦</button>' +
              '</div>' +
            '</div>' +
          '</div>';
        } else {
          liveWindow.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#000;color:var(--dim);">' +
            '<div style="text-align:center;">' +
              '<div style="font-size:48px;margin-bottom:16px;">📺</div>' +
              '<div>暂无进行中的比赛</div>' +
              '<div style="font-size:12px;margin-top:8px;">请选择下方未来比赛查看直播预告，或等待比赛开始</div>' +
            '</div>' +
          '</div>';
        }
        if (liveMeta) liveMeta.innerHTML = '<div style="color:var(--dim);">等待比赛开始...</div>';
      }

      // 下方高亮列表 - 前一天集锦
      if (liveHighlights && !liveMatch) {
        const prevDay = DATA.matches.filter(m => m.completed).slice(-4);
        liveHighlights.innerHTML = '<div style="padding:8px 0;font-size:13px;color:var(--muted);">已完赛比赛进球集锦：</div>' +
          prevDay.map(m => '<div class="video-list-item" onclick="searchGoalVideo(\'' + escapeAttr(m.home + ' ' + m.away + ' all goals highlights') + '\')" style="cursor:pointer;">' +
            '<div style="font-weight:700;">⚽ ' + escapeHtml(m.home) + ' ' + (m.homeScore??'') + ':' + (m.awayScore??'') + ' ' + escapeHtml(m.away) + '</div>' +
            '<div style="font-size:12px;color:var(--dim);">' + escapeHtml(m.time) + ' | 点击查看进球视频</div>' +
          '</div>').join('');
      } else if (liveHighlights && liveMatch) {
        liveHighlights.innerHTML = '';
      }

      // 完赛回放
      const replaySelect = $('replaySelect');
      const completedMatches = DATA.matches.filter(m => m.completed);
      
      if (replaySelect) {
        const current = replaySelect.value;
        replaySelect.innerHTML = '<option value="">选择已完赛比赛</option>' + 
          completedMatches.map(m => '<option value="' + escapeAttr(m.id) + '">' + escapeHtml(m.home) + ' vs ' + escapeHtml(m.away) + ' (' + escapeHtml(m.time) + ')</option>').join('');
        if (completedMatches.find(m => m.id === current)) replaySelect.value = current;
        
        replaySelect.onchange = function() {
          if (this.value) showReplay(this.value);
        };
      }

      // 默认显示最新完赛比赛
      if (completedMatches.length > 0 && replaySelect && !replaySelect.value) {
        showReplay(completedMatches[completedMatches.length - 1].id);
        if (replaySelect) replaySelect.value = completedMatches[completedMatches.length - 1].id;
      }
    }

    // 直播选择变更事件
    document.addEventListener('change', function(e) {
      if (e.target && e.target.id === 'liveMatchSelect') {
        const matchId = e.target.value;
        if (matchId) {
          const match = DATA.matches.find(m => m.id === matchId);
          if (match && !match.live) {
            showLivePreview(match);
          }
        } else {
          renderVideos();
        }
      }
    });

    function showLivePreview(match) {
      const liveWindow = $('liveVideoWindow');
      const liveMeta = $('liveVideoMeta');
      if (!match || !liveWindow) return;

      liveWindow.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#000;color:var(--ink);">' +
        '<div style="text-align:center;padding:20px;">' +
          '<div style="font-size:18px;font-weight:700;margin-bottom:12px;">📅 ' + escapeHtml(match.home) + ' vs ' + escapeHtml(match.away) + '</div>' +
          '<div style="font-size:14px;color:var(--dim);margin-bottom:8px;">' + escapeHtml(match.time) + ' | ' + escapeHtml(match.venue) + '</div>' +
          '<div style="font-size:13px;color:var(--gold);margin-bottom:16px;">⏰ 比赛尚未开始，预计直播将在开赛前30分钟上线</div>' +
          '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
            '<button onclick="window.open(\'https://tv.cctv.com/live/\', \'_blank\')" style="padding:10px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;">📺 CCTV5 直播</button>' +
            '<button onclick="window.open(\'https://sports.qq.com/\', \'_blank\')" style="padding:10px 20px;background:rgba(255,255,255,.1);color:var(--ink);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:14px;">腾讯体育</button>' +
          '</div>' +
          '<div style="margin-top:16px;">' +
            '<button onclick="searchGoalVideo(\'' + escapeAttr('yesterday World Cup highlights') + '\')" style="padding:8px 16px;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;">查看前一天进球集锦</button>' +
          '</div>' +
        '</div>' +
      '</div>';
      if (liveMeta) {
        liveMeta.innerHTML = '<div style="color:var(--blue);font-weight:700;">⏳ 未开赛</div>' +
          '<div>' + escapeHtml(match.home) + ' vs ' + escapeHtml(match.away) + '</div>' +
          '<div style="color:var(--dim);font-size:12px;">' + escapeHtml(match.time) + ' · ' + escapeHtml(match.venue) + '</div>';
      }
    }

    function showReplay(matchId) {
      const match = DATA.matches.find(m => m.id === matchId);
      if (!match) return;

      const window = $('replayVideoWindow');
      const meta = $('replayVideoMeta');
      const list = $('replayList');

      if (window) {
        window.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#000;color:var(--ink);">' +
          '<div style="text-align:center;padding:20px;">' +
            '<div style="font-size:18px;font-weight:700;margin-bottom:12px;">🏆 ' + escapeHtml(match.home) + ' ' + (match.homeScore??'') + ' : ' + (match.awayScore??'') + ' ' + escapeHtml(match.away) + '</div>' +
            '<div style="font-size:14px;color:var(--dim);margin-bottom:16px;">' + escapeHtml(match.time) + ' | ' + escapeHtml(match.venue) + '</div>' +
            '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
              '<button onclick="openVideoSource(\'' + escapeAttr(match.id) + '\', \'replay\')" style="padding:10px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;">🎬 观看回放</button>' +
              '<button onclick="searchGoalVideo(\'' + escapeAttr(match.home + ' ' + match.away + ' all goals highlights') + '\')" style="padding:10px 20px;background:rgba(255,255,255,.1);color:var(--ink);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:14px;">⚽ 进球集锦</button>' +
              '<button onclick="searchMatchNews(\'' + escapeAttr(match.home) + '\', \'' + escapeAttr(match.away) + '\')" style="padding:10px 20px;background:rgba(255,255,255,.1);color:var(--ink);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:14px;">📰 相关新闻</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }

      if (meta) {
        meta.innerHTML = '<div style="color:var(--green);font-weight:700;">✅ 已完赛</div>' +
          '<div>最终比分：' + (match.homeScore??'?') + ' : ' + (match.awayScore??'?') + '</div>' +
          '<div style="color:var(--dim);font-size:12px;">' + escapeHtml(match.venue) + '</div>';
      }

      if (list) {
        const completedMatches = DATA.matches.filter(m => m.completed && m.id !== matchId);
        list.innerHTML = completedMatches.map(m => 
          '<div class="video-list-item' + (m.id === matchId ? ' active' : '') + '" onclick="showReplay(\'' + escapeAttr(m.id) + '\')">' +
            '<div style="font-weight:700;">' + escapeHtml(m.home) + ' vs ' + escapeHtml(m.away) + '</div>' +
            '<div style="font-size:12px;color:var(--dim);">' + escapeHtml(m.time) + ' · ' + (m.homeScore??'?') + ':' + (m.awayScore??'?') + '</div>' +
          '</div>'
        ).join('');
      }
    }

    function openVideoSource(matchId, type) {
      const match = DATA.matches.find(m => m.id === matchId);
      if (!match) return;

      const modal = $('sourceModal');
      const title = $('sourceTitle');
      const subtitle = $('sourceSubtitle');
      const grid = $('sourceGrid');

      if (title) title.textContent = (type === 'live' ? '直播' : '回放') + '来源 - ' + match.home + ' vs ' + match.away;
      if (subtitle) subtitle.textContent = match.time + ' | ' + match.venue;

      const sources = [
        { name: '央视频 (CCTV)', url: 'https://wap.yangshipin.cn/live/detail.html?pid=' + match.id, desc: '官方直播/回放' },
        { name: '央视影音', url: 'https://tv.cctv.com/live/', desc: 'CCTV5 体育频道' },
        { name: '腾讯体育', url: 'https://sports.qq.com/', desc: '可能需要会员' },
        { name: '咪咕视频', url: 'https://www.migu.cn/', desc: '中国移动旗下' },
        { name: '新浪体育', url: 'https://sports.sina.com.cn/', desc: '文字直播/战报' },
        { name: '百度搜索', url: 'https://www.baidu.com/s?wd=' + encodeURIComponent(match.home + ' vs ' + match.away + ' ' + (match.time||'').split(' ')[0] + ' 直播'), desc: '搜索最新直播链接' },
        { name: 'Google 搜索', url: 'https://www.google.com/search?q=' + encodeURIComponent(match.home + ' vs ' + match.away + ' live stream'), desc: '搜索国际直播链接' }
      ];

      if (grid) {
        grid.innerHTML = sources.map(s => 
          '<div class="source-item" onclick="window.open(\'' + escapeAttr(s.url) + '\', \'_blank\')">' +
            '<div style="font-weight:700;margin-bottom:6px;">' + escapeHtml(s.name) + '</div>' +
            '<div style="font-size:12px;color:var(--dim);">' + escapeHtml(s.desc) + '</div>' +
          '</div>'
        ).join('');
      }

      if (modal) {
        modal.style.display = 'flex';
        modal.setAttribute('aria-hidden', 'false');
      }
    }

    function searchMatchNews(home, away) {
      const query = home + ' vs ' + away + ' 世界杯';
      const url = 'https://www.baidu.com/s?wd=' + encodeURIComponent(query);
      window.open(url, '_blank');
    }

    // ============ 事件监听 ============
    document.addEventListener('click', (event) => {
      const jumpBtn = event.target.closest('[data-jump]');
      if (jumpBtn) {
        document.querySelectorAll('[data-jump]').forEach(b => b.classList.remove('active'));
        jumpBtn.classList.add('active');
        const target = document.getElementById(jumpBtn.dataset.jump);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      // 球员统计标签
      const tabBtn = event.target.closest('#playerTabs .tab-btn');
      if (tabBtn) {
        document.querySelectorAll('#playerTabs .tab-btn').forEach(b => b.classList.remove('active'));
        tabBtn.classList.add('active');
        renderPlayerStats(tabBtn.dataset.tab);
      }
    });

    ['searchBox', 'statusFilter', 'groupFilter', 'dateFilter'].forEach(id => {
      $(id).addEventListener('input', renderMatches);
    });

    $('resetFilters').addEventListener('click', () => {
      ['searchBox', 'statusFilter', 'groupFilter', 'dateFilter'].forEach(id => { $(id).value = ''; });
      renderMatches();
    });

    $('refreshBtn').addEventListener('click', async () => {
      $('refreshState').textContent = '刷新中...';
      const newData = await loadDataFromNetwork();
      if (newData) {
        DATA = processData(newData);
        dataSource = '网络数据（手动刷新）';
        updateDataSourceIndicator();
        renderAll();
        resetCountdown();
        $('refreshState').textContent = '已刷新 ' + new Date().toLocaleTimeString('zh-CN', { hour12: false });
      } else {
        renderAll();
        $('refreshState').textContent = '已刷新（使用缓存） ' + new Date().toLocaleTimeString('zh-CN', { hour12: false });
      }
    });

    $('refreshLiveBtn').addEventListener('click', () => {
      renderVideos();
    });

    $('searchReplayBtn').addEventListener('click', () => {
      const select = $('replaySelect');
      if (select && select.value) {
        showReplay(select.value);
      }
    });

    // 进球视频筛选
    $('goalVideoMatchFilter').addEventListener('change', function() {
      renderGoalVideos(this.value);
    });

    // 来源弹窗关闭
    const sourceClose = $('sourceClose');
    if (sourceClose) {
      sourceClose.onclick = function() {
        const modal = $('sourceModal');
        if (modal) {
          modal.style.display = 'none';
          modal.setAttribute('aria-hidden', 'true');
        }
      };
    }

    const sourceModal = $('sourceModal');
    if (sourceModal) {
      sourceModal.addEventListener('click', (e) => {
        if (e.target === sourceModal) {
          sourceModal.style.display = 'none';
          sourceModal.setAttribute('aria-hidden', 'true');
        }
      });
    }

    // ============ 初始化 ============
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initData);
    } else {
      initData();
    }
  </script>
</body>
</html>
