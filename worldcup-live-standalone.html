<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="2026世界杯实时比分、赛程、积分榜、球员统计和视频回放">
  <meta property="og:title" content="2026世界杯实时战报中心">
  <meta property="og:description" content="2026世界杯实时比分、赛程、积分榜、球员统计和视频回放">
  <title>2026 世界杯实时战报中心</title>
  <style>
    /* ============================================================
       2026 FIFA WORLD CUP DESIGN SYSTEM v3.0
       ============================================================ */
    :root {
      /* ---- 2026 世界杯官方配色 ---- */
      --wc-deep: #0a0e27;
      --wc-navy: #0f1b3d;
      --wc-blue: #1a3a6b;
      --wc-accent: #e10600;
      --wc-gold: #c8a44e;
      --wc-green: #0b8a4c;
      --wc-cyan: #00b4d8;
      --wc-purple: #7b2d8e;
      /* ---- 表面层 ---- */
      --surface-0: #080c20;
      --surface-1: #0e1535;
      --surface-2: #141f48;
      --surface-3: #1a2859;
      /* ---- 文字 ---- */
      --text-primary: #f0f2f8;
      --text-secondary: #a8b4d0;
      --text-muted: #647090;
      --text-dim: #455070;
      /* ---- 边框 ---- */
      --border-subtle: rgba(255,255,255,.08);
      --border-default: rgba(255,255,255,.12);
      --border-strong: rgba(255,255,255,.18);
      /* ---- 状态色 ---- */
      --live: #e10600;
      --live-bg: rgba(225,6,0,.15);
      --done: #0b8a4c;
      --done-bg: rgba(11,138,76,.15);
      --upcoming: #00b4d8;
      --upcoming-bg: rgba(0,180,216,.12);
      /* ---- 间距 ---- */
      --gap-xs: 6px;
      --gap-sm: 10px;
      --gap-md: 16px;
      --gap-lg: 24px;
      --gap-xl: 32px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      /* ---- 阴影 ---- */
      --shadow-card: 0 2px 12px rgba(0,0,0,.3), 0 0 1px rgba(255,255,255,.05);
      --shadow-glow: 0 0 40px rgba(200,164,78,.12);
    }

    /* ---- Reset ---- */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{
      font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--surface-0);
      color:var(--text-primary);
      line-height:1.5;
      min-height:100vh;
      overflow-x:hidden;
    }
    body::before{
      content:'';
      position:fixed;inset:0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,164,78,.08),transparent),
        radial-gradient(ellipse 60% 40% at 85% 20%, rgba(0,180,216,.06),transparent),
        radial-gradient(ellipse 50% 40% at 15% 10%, rgba(225,6,0,.04),transparent),
        radial-gradient(ellipse 70% 50% at 50% 80%, rgba(11,138,76,.04),transparent);
      pointer-events:none;z-index:0;
    }

    /* ---- Typography ---- */
    h2{font-size:1.25rem;font-weight:700;letter-spacing:.02em}
    h3{font-size:1.05rem;font-weight:700}
    a{color:var(--wc-cyan);text-decoration:none}
    button,input,select{font:inherit}
    img{max-width:100%;height:auto}

    /* ---- Skip Link ---- */
    .skip-link{position:absolute;top:-48px;left:12px;background:var(--surface-2);color:var(--text-primary);padding:8px 16px;border-radius:var(--radius-sm);z-index:1000;font-size:.85rem}
    .skip-link:focus{top:12px}

    /* ============================================================
       HEADER & NAVIGATION
       ============================================================ */
    header{
      position:sticky;top:0;z-index:100;
      background:rgba(8,12,32,.92);
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid var(--border-subtle);
    }
    .nav{
      max-width:1200px;margin:0 auto;
      padding:12px 20px;
      display:flex;align-items:center;justify-content:space-between;
      gap:var(--gap-md);
    }
    .brand{
      display:flex;align-items:center;gap:10px;
      font-weight:800;font-size:1.05rem;
      white-space:nowrap;flex-shrink:0;
    }
    .brand-icon{
      width:36px;height:36px;flex-shrink:0;
      border-radius:50%;
      background:conic-gradient(from 30deg, var(--wc-accent), var(--wc-gold), var(--wc-green), var(--wc-cyan), var(--wc-accent));
      box-shadow:0 0 24px rgba(200,164,78,.3);
      position:relative;
    }
    .brand-icon::after{
      content:'⚽';
      position:absolute;inset:3px;border-radius:50%;
      background:var(--surface-0);
      display:flex;align-items:center;justify-content:center;
      font-size:15px;
    }
    .brand-text{line-height:1.2}
    .brand-text .year{font-size:.65rem;color:var(--wc-gold);letter-spacing:.15em;display:block;font-weight:600}
    .brand-text .title{font-size:.95rem}

    /* Nav buttons */
    .nav-links{display:flex;gap:var(--gap-xs);flex-wrap:wrap;align-items:center}
    .nav-links button{
      padding:7px 14px;border-radius:20px;
      border:1px solid var(--border-default);
      background:rgba(255,255,255,.04);
      color:var(--text-secondary);
      cursor:pointer;font-size:.8rem;font-weight:600;
      transition:all .2s;white-space:nowrap;
    }
    .nav-links button:hover{background:rgba(255,255,255,.08);color:var(--text-primary)}
    .nav-links button.active{background:linear-gradient(135deg,var(--wc-accent),var(--wc-purple));border-color:transparent;color:#fff}
    .nav-links .btn-refresh{
      background:var(--wc-gold);color:#0a0e27;border-color:transparent;font-weight:700;
    }
    .nav-links .btn-refresh:hover{background:#d4b45a}

    .nav-status{display:flex;align-items:center;gap:var(--gap-sm);font-size:.72rem;color:var(--text-muted)}
    .nav-countdown{color:var(--wc-gold);font-weight:600}
    .nav-mobile-toggle{display:none;background:none;border:none;color:var(--text-primary);font-size:1.5rem;cursor:pointer;padding:4px 8px}

    /* Data indicator bar */
    .data-bar{
      max-width:1200px;margin:0 auto;padding:6px 20px;
      display:flex;align-items:center;gap:var(--gap-md);
      font-size:.7rem;color:var(--text-dim);
      flex-wrap:wrap;
    }
    .data-bar .dot{width:6px;height:6px;border-radius:50%;background:var(--wc-green);flex-shrink:0}
    .data-bar .dot.stale{background:var(--wc-gold)}
    .data-bar .dot.offline{background:var(--wc-accent)}

    /* ============================================================
       MAIN LAYOUT
       ============================================================ */
    main{max-width:1200px;margin:0 auto;padding:20px 20px 60px;position:relative;z-index:1}
    .section{margin-bottom:var(--gap-xl)}
    .section-header{margin-bottom:var(--gap-md)}
    .section-header h2{display:flex;align-items:center;gap:var(--gap-sm)}
    .section-header h2::before{
      content:'';display:inline-block;
      width:4px;height:20px;border-radius:2px;
      background:linear-gradient(180deg,var(--wc-gold),var(--wc-accent));
    }
    .section-header .sub{font-size:.8rem;color:var(--text-muted);margin-top:4px}

    /* ============================================================
       HERO AREA - 战报 + 数据概览 (单列纵向)
       ============================================================ */
    .hero{
      display:flex;flex-direction:column;
      gap:var(--gap-lg);
      margin-bottom:var(--gap-xl);
    }
    /* 战报卡片行 */
    .hero-top{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:var(--gap-md);
    }
    .hero-card{
      background:var(--surface-1);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-lg);
      padding:20px;
      position:relative;
      overflow:hidden;
      transition:transform .2s,box-shadow .2s;
    }
    .hero-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-card)}
    .hero-card::before{
      content:'';position:absolute;top:0;left:0;right:0;
      height:3px;
    }
    .hero-card.card-latest::before{background:var(--done)}
    .hero-card.card-next::before{background:var(--upcoming)}
    .hero-card.card-leader::before{background:var(--wc-gold)}
    .hero-card-label{font-size:.75rem;color:var(--text-muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
    .hero-card-title{font-size:1.15rem;font-weight:700;margin-bottom:4px}
    .hero-card-detail{font-size:.8rem;color:var(--text-dim)}

    /* 热点区 */
    .hotspot{
      background:linear-gradient(135deg,var(--surface-1),var(--surface-2));
      border:1px solid var(--border-default);
      border-radius:var(--radius-lg);
      padding:22px;
    }
    .hotspot h3{color:var(--wc-gold);margin-bottom:8px}
    .hotspot p{color:var(--text-secondary);font-size:.9rem;line-height:1.7}
    .hotspot-chips{margin-top:12px;display:flex;gap:var(--gap-xs);flex-wrap:wrap}

    /* 数据指标条 */
    .metric-bar{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:var(--gap-sm);
    }
    .metric-item{
      background:var(--surface-1);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-md);
      padding:16px 12px;
      text-align:center;
      transition:transform .2s;
    }
    .metric-item:hover{transform:translateY(-2px)}
    .metric-value{font-size:1.8rem;font-weight:800;line-height:1.2}
    .metric-value.gold{color:var(--wc-gold)}
    .metric-value.green{color:var(--wc-green)}
    .metric-value.red{color:var(--wc-accent)}
    .metric-value.cyan{color:var(--wc-cyan)}
    .metric-label{font-size:.72rem;color:var(--text-muted);margin-top:4px}

    /* ============================================================
       MATCH CARDS
       ============================================================ */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--gap-md)}
    .match-card{
      background:var(--surface-1);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-lg);
      padding:18px;
      transition:all .2s;
    }
    .match-card:hover{border-color:var(--border-default);box-shadow:var(--shadow-card)}
    .match-card.live-card{border-color:rgba(225,6,0,.3);box-shadow:0 0 20px rgba(225,6,0,.08)}
    .match-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.78rem;color:var(--text-muted)}
    .match-teams{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .match-team{flex:1;text-align:center}
    .match-team-name{font-weight:700;font-size:1rem;margin-bottom:2px}
    .match-score{
      font-size:1.5rem;font-weight:800;
      padding:6px 16px;border-radius:var(--radius-sm);
      background:var(--surface-2);
      letter-spacing:2px;
      flex-shrink:0;
    }
    .match-score.live{background:var(--live-bg);color:var(--live)}
    .match-score.done{background:var(--done-bg);color:var(--done)}
    .match-score.upcoming{background:var(--upcoming-bg);color:var(--upcoming)}
    .match-venue{font-size:.75rem;color:var(--text-dim);margin-top:10px;text-align:center}

    /* 状态标签 */
    .pill{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 10px;border-radius:20px;
      font-size:.72rem;font-weight:700;
    }
    .pill.live{background:var(--live-bg);color:var(--live)}
    .pill.done{background:var(--done-bg);color:var(--done)}
    .pill.upcoming{background:var(--upcoming-bg);color:var(--upcoming)}
    .pill.default-pill{background:rgba(255,255,255,.06);color:var(--text-muted)}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* ============================================================
       FILTER CONTROLS
       ============================================================ */
    .controls{
      display:flex;gap:var(--gap-sm);flex-wrap:wrap;align-items:center;
      margin-bottom:var(--gap-md);
    }
    .controls input[type="text"],
    .controls select{
      padding:8px 14px;border-radius:var(--radius-sm);
      border:1px solid var(--border-default);
      background:var(--surface-1);
      color:var(--text-primary);
      font-size:.82rem;
      min-width:120px;
    }
    .controls input::placeholder{color:var(--text-dim)}
    .controls select option{background:var(--surface-2);color:var(--text-primary)}
    .btn{ 
      padding:8px 16px;border-radius:var(--radius-sm);
      border:1px solid var(--border-default);
      background:rgba(255,255,255,.06);
      color:var(--text-secondary);
      cursor:pointer;font-size:.8rem;font-weight:600;
      transition:all .2s;
    }
    .btn:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}
    .btn-primary{background:var(--wc-blue);border-color:transparent;color:#fff}
    .btn-primary:hover{background:#2255a0}

    /* ============================================================
       TAB BAR
       ============================================================ */
    .tabs{display:flex;gap:var(--gap-xs);flex-wrap:wrap;margin-bottom:var(--gap-md)}
    .tab-btn{
      padding:8px 18px;border-radius:20px;
      border:1px solid var(--border-default);
      background:rgba(255,255,255,.04);
      color:var(--text-secondary);
      cursor:pointer;font-size:.8rem;font-weight:600;
      transition:all .2s;
    }
    .tab-btn:hover{background:rgba(255,255,255,.08)}
    .tab-btn.active{background:linear-gradient(135deg,var(--wc-blue),var(--wc-cyan));border-color:transparent;color:#fff}

    /* ============================================================
       TABLE
       ============================================================ */
    .table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border-subtle)}
    .table-wrap::-webkit-scrollbar{height:6px}
    .table-wrap::-webkit-scrollbar-track{background:var(--surface-1)}
    .table-wrap::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
    table{width:100%;border-collapse:collapse;font-size:.82rem}
    th{
      background:var(--surface-2);padding:12px 14px;
      text-align:left;font-weight:700;font-size:.75rem;
      color:var(--text-muted);white-space:nowrap;
      border-bottom:1px solid var(--border-default);
    }
    td{
      padding:10px 14px;
      border-bottom:1px solid var(--border-subtle);
      white-space:nowrap;
    }
    tr:hover td{background:rgba(255,255,255,.02)}
    tr:last-child td{border-bottom:none}

    /* ============================================================
       PLAYER CARDS
       ============================================================ */
    .player-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:var(--gap-sm);
    }
    .player-card{
      background:var(--surface-1);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-md);
      padding:14px 16px;
      display:flex;align-items:center;gap:14px;
      transition:all .2s;
    }
    .player-card:hover{border-color:var(--border-default);box-shadow:var(--shadow-card)}
    .player-rank{
      font-size:1.3rem;font-weight:800;
      color:var(--wc-gold);
      min-width:28px;text-align:center;
    }
    .player-rank.silver{color:var(--text-muted)}
    .player-rank.bronze{color:#c47a38}
    .player-info{flex:1;min-width:0}
    .player-name{font-weight:700;font-size:.9rem;overflow:hidden;text-overflow:ellipsis}
    .player-team{font-size:.72rem;color:var(--text-muted)}
    .player-stat-val{font-size:1.2rem;font-weight:800;text-align:center}
    .player-stat-lbl{font-size:.65rem;color:var(--text-dim);text-align:center}

    /* ============================================================
       GOAL VIDEO CARDS
       ============================================================ */
    .goal-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:var(--gap-md);
    }
    .goal-card{
      background:var(--surface-1);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-lg);
      overflow:hidden;
      cursor:pointer;
      transition:all .2s;
    }
    .goal-card:hover{border-color:var(--wc-gold);box-shadow:var(--shadow-glow)}
    .goal-thumb{
      height:150px;background:linear-gradient(135deg,var(--surface-2),var(--surface-3));
      display:flex;align-items:center;justify-content:center;
      position:relative;
    }
    .goal-play{
      width:48px;height:48px;border-radius:50%;
      background:rgba(225,6,0,.85);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;color:#fff;
      transition:transform .2s;
    }
    .goal-card:hover .goal-play{transform:scale(1.1)}
    .goal-info{padding:14px 16px}
    .goal-match{font-size:.75rem;color:var(--text-muted)}
    .goal-player{font-weight:700;margin:4px 0;font-size:.9rem}
    .goal-detail{font-size:.72rem;color:var(--text-dim)}

    /* ============================================================
       VIDEO SECTION
       ============================================================ */
    .video-layout{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:var(--gap-lg);
    }
    .video-panel{
      background:var(--surface-1);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-lg);
      padding:20px;
    }
    .video-panel h3{font-size:.95rem;margin-bottom:12px}
    .video-window{
      position:relative;width:100%;
      padding-bottom:56.25%;
      background:#000;
      border-radius:var(--radius-md);
      overflow:hidden;
      margin-bottom:12px;
    }
    .video-window>div{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
    }
    .video-window iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
    .video-meta{font-size:.78rem;color:var(--text-dim);margin-bottom:12px}
    .video-list{max-height:350px;overflow-y:auto;padding-right:4px}
    .video-list::-webkit-scrollbar{width:4px}
    .video-list::-webkit-scrollbar-track{background:transparent}
    .video-list::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:2px}
    .video-list-item{
      padding:10px 12px;border-radius:var(--radius-sm);
      cursor:pointer;transition:background .15s;
      border:1px solid transparent;
    }
    .video-list-item:hover{background:rgba(255,255,255,.04)}
    .video-list-item.active{background:rgba(0,180,216,.08);border-color:rgba(0,180,216,.2)}

    /* ============================================================
       LEADERBOARD
       ============================================================ */
    .leader-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:var(--gap-sm);
      margin-bottom:var(--gap-lg);
    }
    .leader-item{
      background:var(--surface-1);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-md);
      padding:14px 18px;
      display:flex;justify-content:space-between;align-items:center;
    }

    /* ============================================================
       MODAL
       ============================================================ */
    .modal-overlay{
      position:fixed;inset:0;z-index:1000;
      background:rgba(0,0,0,.75);
      display:none;align-items:center;justify-content:center;
    }
    .modal-overlay.open{display:flex}
    .modal-dialog{
      background:var(--surface-1);
      border:1px solid var(--border-default);
      border-radius:var(--radius-xl);
      padding:24px;max-width:680px;width:92%;
      max-height:80vh;overflow-y:auto;
    }
    .modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
    .modal-close{background:none;border:none;color:var(--text-secondary);font-size:1.5rem;cursor:pointer;padding:4px}
    .source-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:var(--gap-sm);
    }
    .source-item{
      padding:14px 12px;background:var(--surface-2);
      border:1px solid var(--border-subtle);
      border-radius:var(--radius-md);
      text-align:center;cursor:pointer;
      transition:all .2s;
    }
    .source-item:hover{background:var(--surface-3);border-color:var(--wc-cyan)}
    .source-item .src-name{font-weight:700;font-size:.85rem;margin-bottom:4px}
    .source-item .src-desc{font-size:.7rem;color:var(--text-dim)}

    /* ============================================================
       FOOTER
       ============================================================ */
    footer{
      text-align:center;color:var(--text-dim);font-size:.72rem;
      padding:28px 20px;border-top:1px solid var(--border-subtle);
      position:relative;z-index:1;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    /* 平板 (768-1024px) */
    @media (max-width:1024px){
      .hero-top{grid-template-columns:repeat(3,1fr)}
      .metric-bar{grid-template-columns:repeat(3,1fr)}
      .video-layout{grid-template-columns:1fr}
    }
    /* 手机横屏/小平板 (600-768px) */
    @media (max-width:768px){
      .nav{padding:10px 14px}
      .brand-text .title{font-size:.85rem}
      .nav-links{gap:4px}
      .nav-links button{padding:6px 10px;font-size:.7rem;border-radius:16px}
      .nav-status{font-size:.68rem}
      main{padding:14px 14px 40px}
      .hero-top{grid-template-columns:1fr 1fr;gap:var(--gap-sm)}
      .hero-top .hero-card:last-child{grid-column:1/-1}
      .metric-bar{grid-template-columns:repeat(3,1fr);gap:var(--gap-xs)}
      .metric-item{padding:12px 8px}
      .metric-value{font-size:1.4rem}
      .grid{grid-template-columns:1fr;gap:var(--gap-sm)}
      .player-grid{grid-template-columns:1fr}
      .goal-grid{grid-template-columns:1fr}
      .leader-grid{grid-template-columns:1fr 1fr}
      h2{font-size:1.1rem}

    // ============ 数据处理 ============
    let DATA = null;
    let dataSource = '内联数据';
    const $ = id => document.getElementById(id);
    function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function escA(s){return esc(s).replace(/`/g,'&#96;')}
    function sgn(v){const n=Number(v||0);return n>0?`+${n}`:String(n)}

    // ★ 核心：带超时的 fetch
    async function fetchWithTimeout(url, opts={}, timeout=DATA_CONFIG.fetchTimeout){
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),timeout);
      try{
        const r=await fetch(url,{...opts,signal:ctrl.signal});
        clearTimeout(timer);
        return r;
      }catch(e){
        clearTimeout(timer);
        throw e;
      }
    }

    // ★ 主数据加载：data.json → openfootball → 内联后备
    // data.json 由 GitHub Action 每30分钟从 openfootball + ESPN 拉取自动更新
    // 页面加载时优先取 data.json（最可靠），openfootball 作为辅助校验
    async function loadDataFromNetwork(){
      const log=msg=>{if(DATA_CONFIG.debug)console.log(`[数据] ${msg}`)};
      const now=Date.now();

      // ═══ 策略1：data.json（GitHub Action 每30分钟自动更新，最可靠） ═══
      try{
        log('▶ 策略1: data.json');
        const cacheBust=`t=${now}&_=${Math.random().toString(36).slice(2,8)}`;
        const r=await fetchWithTimeout(
          DATA_CONFIG.primaryUrl+'?'+cacheBust,
          {cache:'no-store',headers:{
            'Cache-Control':'no-cache,no-store,max-age=0',
            'Pragma':'no-cache'
          }}
        );
        if(r.ok){
          const data=await r.json();
          if(data&&data.matches&&data.matches.length>0){
            log('✓ data.json 成功 ('+data.matches.length+'场比赛, '+data.metrics?.completedMatches+'场已完赛)');
            return data;
          }
          log('data.json 无有效比赛数据');
        }else{
          log('data.json HTTP '+r.status);
        }
      }catch(e){log('data.json 失败: '+e.message)}

      // ═══ 策略2：openfootball 社区数据（有实时比分，直接转换） ═══
      try{
        log('▶ 策略2: openfootball 社区数据');
        const r=await fetchWithTimeout(
          DATA_CONFIG.openfootballUrl+'?t='+now,
          {cache:'no-store',headers:{'Accept':'application/json'}}
        );
        if(r.ok){
          const data=await r.json();
          if(data&&(data.matches||data.rounds)){
            log('✓ openfootball 成功');
            const converted=convertOpenFootballData(data);
            if(converted&&converted.matches&&converted.matches.length>0){
              return converted;
            }
          }
          log('openfootball 数据为空');
        }else{
          log('openfootball HTTP '+r.status);
        }
      }catch(e){log('openfootball 失败: '+e.message)}

      log('✗ 所有网络源失败，使用内联后备数据');
      return null;
    }

    // 将 openfootball/worldcup.json 格式转为页面格式
    function convertOpenFootballData(data){
      const now=new Date();
      let completedCount=0, liveCount=0;
      const todayStr=now.toISOString().slice(0,10);

      const roundMap={
        'Matchday 1':'小组赛第1轮','Matchday 2':'小组赛第2轮','Matchday 3':'小组赛第3轮',
        'Matchday 4':'小组赛第1轮','Matchday 5':'小组赛第2轮','Matchday 6':'小组赛第3轮',
        'Matchday 7':'小组赛第1轮','Matchday 8':'小组赛第2轮','Matchday 9':'小组赛第3轮',
        'Matchday 10':'小组赛第2轮','Matchday 11':'小组赛第3轮','Matchday 12':'小组赛第2轮',
        'Matchday 13':'小组赛第3轮','Matchday 14':'小组赛第3轮',
        'Round of 32':'32强赛','Round of 16':'16强赛',
        'Quarter-final':'1/4决赛','Semi-final':'半决赛',
        'Match for third place':'三四名决赛','Final':'决赛'
      };

      const groupMap={'Group A':'A组','Group B':'B组','Group C':'C组','Group D':'D组',
        'Group E':'E组','Group F':'F组','Group G':'G组','Group H':'H组',
        'Group I':'I组','Group J':'J组','Group K':'K组','Group L':'L组'};

      // 队名映射到中文显示
      const teamNameMap={
        'Mexico':'墨西哥','South Africa':'南非','South Korea':'韩国','Czech Republic':'捷克',
        'Canada':'加拿大','Bosnia & Herzegovina':'波黑','Qatar':'卡塔尔','Switzerland':'瑞士',
        'Brazil':'巴西','Morocco':'摩洛哥','Haiti':'海地','Scotland':'苏格兰',
        'USA':'美国','Paraguay':'巴拉圭','Australia':'澳大利亚','Turkey':'土耳其',
        'Germany':'德国','Curaçao':'库拉索','Ivory Coast':'科特迪瓦','Ecuador':'厄瓜多尔',
        'Netherlands':'荷兰','Japan':'日本','Sweden':'瑞典','Tunisia':'突尼斯',
        'Belgium':'比利时','Egypt':'埃及','Iran':'伊朗','New Zealand':'新西兰',
        'Spain':'西班牙','Cape Verde':'佛得角','Saudi Arabia':'沙特阿拉伯','Uruguay':'乌拉圭',
        'France':'法国','Senegal':'塞内加尔','Iraq':'伊拉克','Norway':'挪威',
        'Argentina':'阿根廷','Algeria':'阿尔及利亚','Austria':'奥地利','Jordan':'约旦',
        'Portugal':'葡萄牙','DR Congo':'刚果(金)','Uzbekistan':'乌兹别克斯坦','Colombia':'哥伦比亚',
        'England':'英格兰','Croatia':'克罗地亚','Ghana':'加纳','Panama':'巴拿马'
      };

      const matches=(data.matches||[]).map((m,i)=>{
        const hasScore=m.score&&m.score.ft;
        const isFinished=!!hasScore;
        if(isFinished)completedCount++;
        const homeScore=hasScore?(m.score.ft[0]||0):0;
        const awayScore=hasScore?(m.score.ft[1]||0):0;
        const homeTeam=m.team1||'?';
        const awayTeam=m.team2||'?';

        // 解析时间 "13:00 UTC-6" -> 提取时间部分并转北京时间
        let timeStr='待定';
        if(m.time){
          try{
            timeStr=m.time.split(' ')[0]; // 取 "13:00"
          }catch(e){}
        }

        // 进球者信息
        const homeScorers=(m.goals1||[]).map(g=>({name:g.name,minute:g.minute}));
        const awayScorers=(m.goals2||[]).map(g=>({name:g.name,minute:g.minute}));

        return {
          id:'M'+String(m.num||(i+1)).padStart(2,'0'),
          time:timeStr,
          date:m.date||'',
          stage:roundMap[m.round]||m.round||'小组赛',
          group:groupMap[m.group]||(m.group||''),
          home:homeTeam,
          away:awayTeam,
          homeScore:homeScore,
          awayScore:awayScore,
          score:isFinished?homeScore+':'+awayScore:'-',
          status:isFinished?'已完赛':'未开赛',
          statusRaw:isFinished?'FULL_TIME':'TIMED',
          venue:m.ground||'',
          source:'OpenFootball 社区数据',
          completed:isFinished,
          live:false,
          homeScorers:homeScorers,
          awayScorers:awayScorers,
          // 保留原始队名用于中英文映射
          _homeEn:homeTeam,
          _awayEn:awayTeam
        };
      });

      // 统计今日/明日赛事
      const todayMatches=matches.filter(m=>m.date===todayStr);
      const finishedToday=todayMatches.filter(m=>m.completed);
      const tomorrowStr=new Date(Date.now()+86400000).toISOString().slice(0,10);
      const tomorrowMatches=matches.filter(m=>m.date===tomorrowStr);

      // 构建积分榜（根据比赛结果计算）
      const standings=buildStandings(matches, groupMap, teamNameMap);

      // 热点信息（使用中文队名）
      let hotspotTitle='', hotspotBody='';
      if(finishedToday.length>0){
        hotspotTitle=todayStr+' 完赛焦点：'+finishedToday.slice(0,4).map(m=>(teamNameMap[m._homeEn]||m.home)+':'+m.homeScore+' '+(teamNameMap[m._awayEn]||m.away)+':'+m.awayScore).join(' | ');
      }else{
        hotspotTitle=todayStr+' 今日赛事';
      }
      const parts=[];
      finishedToday.slice(0,4).forEach(m=>{parts.push((teamNameMap[m._homeEn]||m.home)+(m.homeScore||0)+':'+(teamNameMap[m._awayEn]||m.away)+(m.awayScore||0))});
      tomorrowMatches.slice(0,4).forEach(m=>{parts.push((teamNameMap[m._homeEn]||m.home)+' vs '+(teamNameMap[m._awayEn]||m.away))});
      hotspotBody=parts.join(' | ') || '暂无赛事';

      // 更新TEAM_NAMES_ZH映射表
      Object.keys(teamNameMap).forEach(en=>{
        if(!TEAM_NAMES_ZH[en]&&!TEAM_NAMES_ZH[teamNameMap[en]]){
          TEAM_NAMES_ZH[en]=teamNameMap[en];
        }
      });

      return {
        meta:{
          title:'2026 世界杯实时战报中心',
          reportDate:todayStr,
          resultsDate:todayStr,
          tomorrowDate:tomorrowStr,
          generatedAt:new Date(now.getTime()+8*3600000).toISOString().slice(0,19).replace('T',' '),
          timezone:'Asia/Shanghai',
          source:'openfootball/worldcup.json (GitHub)'
        },
        metrics:{
          totalMatches:matches.length,
          completedMatches:completedCount,
          liveMatches:liveCount,
          standingsRows:standings.length,
          disciplineEvents:0,
          tomorrowFixtures:tomorrowMatches.length
        },
        hotspot:{title:hotspotTitle,body:hotspotBody,chips:['完赛比分','次日赛程','积分走势']},
        matches:matches,
        standings:standings,
        discipline:[],
        playerStats:{
          scorers:extractTopScorers(matches),
          assists:[]
        }
      };
    }

    // 根据比赛结果计算积分榜
    function buildStandings(matches, groupMap, teamNameMap){
      // 只处理有结果的比赛
      const table={};
      matches.filter(m=>m.completed&&m.group).forEach(m=>{
        ['home','away'].forEach(side=>{
          const teamKey=m['_'+side+'En'];
          const grp=m.group;
          const key=grp+'|'+teamKey;
          if(!table[key]){
            table[key]={group:grp,teamEn:teamKey,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0};
          }
          const row=table[key];
          row.played++;
          const goalsFor=(side==='home')?m.homeScore:m.awayScore;
          const goalsAgainst=(side==='home')?m.awayScore:m.homeScore;
          row.gf+=goalsFor; row.ga+=goalsAgainst; row.gd=row.gf-row.ga;
          if(goalsFor>goalsAgainst){row.won++;row.pts+=3}
          else if(goalsFor===goalsAgainst){row.drawn++;row.pts++}
          else{row.lost++}
        });
      });

      const result=Object.values(table)
        .map(row=>({
          team:teamNameMap[row.teamEn]||row.teamEn,
          played:row.played,won:row.won,drawn:row.drawn,lost:row.lost,
          goalsFor:row.gf,goalsAgainst:row.ga,
          goalDifference:row.gd,points:row.pts,group:row.group
        }))
        .sort((a,b)=>b.points-a.points||b.goalDifference-a.goalDifference);
      return result;
    }

    // 提取射手榜（返回与renderPlayerStats匹配的格式：{rank,player,team,goals,matches}）
    function extractTopScorers(matches){
      const scorerMap={};
      matches.filter(m=>m.completed).forEach(m=>{
        const homeTeam=zhName(m.home);
        const awayTeam=zhName(m.away);
        (m.homeScorers||[]).forEach(s=>{
          const key=s.name;
          if(!scorerMap[key])scorerMap[key]={name:s.name,team:homeTeam,goals:0,matches:new Set()};
          scorerMap[key].goals++;
          scorerMap[key].matches.add(m.id);
        });
        (m.awayScorers||[]).forEach(s=>{
          const key=s.name;
          if(!scorerMap[key])scorerMap[key]={name:s.name,team:awayTeam,goals:0,matches:new Set()};
          scorerMap[key].goals++;
          scorerMap[key].matches.add(m.id);
        });
      });
      return Object.values(scorerMap)
        .sort((a,b)=>b.goals-a.goals)
        .slice(0,20)
        .map((p,i)=>({rank:i+1,player:p.player||p.name,team:p.team,goals:p.goals,matches:p.matches.size}));
    }

    function processData(raw){
      if(raw.matches){raw.matches.sort((a,b)=>new Date(a.time)-new Date(b.time))}
      if(raw.standings){raw.standings.sort((a,b)=>b.points-a.points||b.goalDifference-a.goalDifference)}
      if(raw.matches){raw.matches.forEach(m=>{m.home=zhName(m.home);m.away=zhName(m.away);if(m.venue)m.venue=zhVenue(m.venue)})}
      if(raw.standings){raw.standings.forEach(s=>{s.team=zhName(s.team)})}
      if(raw.discipline){raw.discipline.forEach(d=>{d.team=zhName(d.team)})}
      if(raw.playerStats){['scorers','assists'].forEach(k=>{if(raw.playerStats[k])raw.playerStats[k].forEach(p=>{p.team=zhName(p.team)})})}
      return raw;
    }

    async function initData(){
      console.log('[启动] 开始加载数据...');
      const nd=await loadDataFromNetwork();
      if(nd){
        DATA=processData(nd);
        dataSource=nd.meta?nd.meta.source:'网络数据';
        console.log('[启动] 数据加载完成: '+dataSource);
      }else{
        console.log('[启动] 网络数据加载失败，使用内联后备数据');
        DATA=processData(JSON.parse(JSON.stringify(INLINE_DATA)));
        dataSource='内联后备数据 ⚠️ 离线';
      }
      updateDataBar();renderAll();setupAutoRefresh();setupCountdown();
    }

    function updateDataBar(){
      // 数据来源显示（更直观）
      const isLive=dataSource.includes('ESPN')||dataSource.includes('实时');
      const isCached=dataSource.includes('data.json')||dataSource.includes('OpenFootball');
      const isOffline=dataSource.includes('离线')||dataSource.includes('后备');
      
      let statusIcon='🟢', statusText='实时数据';
      if(isOffline){statusIcon='🔴';statusText='离线数据';}
      else if(isCached){statusIcon='🟡';statusText='缓存数据';}
      else if(isLive){statusIcon='🟢';statusText='实时数据';}
      
      $('dataSourceText').textContent=`${statusIcon} ${statusText} · ${dataSource}`;
      $('dataBar').style.display='flex';
      if(DATA&&DATA.meta&&DATA.meta.generatedAt)
        $('dataUpdateTime').textContent='最后更新: '+DATA.meta.generatedAt+' (北京)';
      const mins=Math.floor(DATA_CONFIG.autoRefreshInterval/60000);
      $('autoRefreshInfo').textContent=`每${mins}分钟自动刷新`;
      const dot=$('dataDot');
      if(isOffline)dot.className='dot offline';
      else if(isCached)dot.className='dot stale';
      else dot.className='dot';
    }

    // ============ 自动刷新 ============
    let refreshTimer=null,countdownTimer=null;
    function setupAutoRefresh(){
      if(refreshTimer)clearInterval(refreshTimer);
      refreshTimer=setInterval(async()=>{
        console.log('[自动刷新] 检查数据更新...');
        const nd=await loadDataFromNetwork();
        if(nd){
          const oldSrc=dataSource;
          DATA=processData(nd);
          dataSource=nd.meta?nd.meta.source:'网络数据';
          if(oldSrc!==dataSource||DATA_CONFIG.debug)
            console.log('[自动刷新] 数据已更新: '+dataSource);
          updateDataBar();renderAll();
        }else{
          console.log('[自动刷新] 无新数据可用');
        }
        resetCountdown();
      },DATA_CONFIG.autoRefreshInterval);
    }
    function setupCountdown(){resetCountdown()}
    function resetCountdown(){
      if(countdownTimer)clearInterval(countdownTimer);
      let rem=Math.floor(DATA_CONFIG.autoRefreshInterval/1000);
      const el=$('countdownTimer');
      countdownTimer=setInterval(()=>{
        rem--;if(rem<=0)rem=Math.floor(DATA_CONFIG.autoRefreshInterval/1000);
        const m=Math.floor(rem/60),s=rem%60;
        if(el)el.textContent=`下次刷新: ${m}:${String(s).padStart(2,'0')}`;
      },1000);
    }

    // ============ 卡片构建 ============
    function matchCard(m){
      let scoreHtml,statusClass;
      if(m.live){scoreHtml=`${m.homeScore??''}:${m.awayScore??''}`;statusClass='live'}
      else if(m.completed){scoreHtml=`${m.homeScore??''}:${m.awayScore??''}`;statusClass='done'}
      else{scoreHtml='VS';statusClass='upcoming'}
      const statusLabel=m.live?'&#9679; 进行中':(m.completed?'已完赛':(m.status||'未开赛'));
      const liveClass=m.live?' live-card':'';
      return `<article class="match-card${liveClass}">
        <div class="match-card-head">
          <span>${esc(m.time||'待定')}</span>
          <span>${esc([m.stage,m.group].filter(Boolean).join(' · '))}</span>
        </div>
        <div class="match-teams">
          <div class="match-team"><div class="match-team-name">${esc(m.home)}</div></div>
          <div class="match-score ${statusClass}">${esc(scoreHtml)}</div>
          <div class="match-team"><div class="match-team-name">${esc(m.away)}</div></div>
        </div>
        <div style="text-align:center;margin-top:8px"><span class="pill ${statusClass}">${statusLabel}</span></div>
        <div class="match-venue">${esc(m.venue||'待定')}</div>
      </article>`;
    }

    function rankClass(i){if(i===1)return'';if(i===2)return' silver';if(i===3)return' bronze';return' silver'}

    // ============ 主渲染 ============

      if(!DATA)return;
      $('leadText').textContent='数据日期：'+DATA.meta.reportDate+'。生成时间：'+DATA.meta.generatedAt+'。时区：北京时间。';

      $('hotspotTitle').textContent=DATA.hotspot.title;
      $('hotspotBody').textContent=DATA.hotspot.body;
      $('hotspotChips').innerHTML=(DATA.hotspot.chips||[]).map(l=>'<span class="pill default-pill">'+esc(l)+'</span>').join('');
      // 指标
      const mt=DATA.metrics;
      const metricItems=[
        ['累计比赛',mt.totalMatches,'gold'],
        ['已完赛',mt.completedMatches,'green'],
        ['进行中',mt.liveMatches,'red'],
        ['积分记录',mt.standingsRows,'cyan'],
        ['红黄牌',mt.disciplineEvents,'red'],

      $('metrics').innerHTML=metricItems.map(([l,v,c])=>'<div class="metric-item"><div class="metric-value '+c+'">'+v+'</div><div class="metric-label">'+l+'</div></div>').join('');
      // Hero
      const latest=[...DATA.matches].filter(m=>m.completed).sort((a,b)=>String(b.time||'').localeCompare(String(a.time||'')))[0];
      const next=[...DATA.matches].filter(m=>!m.completed).sort((a,b)=>String(a.time||'').localeCompare(String(b.time||'')))[0];
      const leader=[...DATA.standings].sort((a,b)=>b.points-a.points||b.goalDifference-a.goalDifference)[0];
      const tiles=[
        ['最新战报','card-latest',latest?latest.home+' '+(latest.homeScore??'')+':'+(latest.awayScore??'')+' '+latest.away:'暂无完赛比分',latest?latest.time||'':'等待数据写入'],
        ['下一场比赛','card-next',next?next.home+' vs '+next.away:'暂无待赛赛程',next?next.time||'':'等待数据写入'],
        ['积分领跑','card-leader',leader?leader.team+' '+leader.points+'分':'暂无积分数据',leader?leader.group+' · 净胜球 '+sgn(leader.goalDifference):'等待数据写入']
      ];
      $('heroBoard').innerHTML=tiles.map(([lbl,cls,title,det])=>'<div class="hero-card '+cls+'"><div class="hero-card-label">'+esc(lbl)+'</div><div class="hero-card-title">'+esc(title)+'</div><div class="hero-card-detail">'+esc(det)+'</div></div>').join('');
      // 次日
      const tomorrow=DATA.matches.filter(m=>!m.completed&&m.date===DATA.meta.tomorrowDate);
      $('tomorrowNote').textContent='次日赛程日期：'+DATA.meta.tomorrowDate;
      $('tomorrowGrid').innerHTML=tomorrow.length?tomorrow.map(matchCard).join(''):'<div class="empty-state"><div class="icon">&#128197;</div><div>暂无次日赛程。</div></div>';
      // 焦点
      const focus=DATA.matches.filter(m=>m.live||m.date===DATA.meta.reportDate);
      $('focusGrid').innerHTML=focus.length?focus.map(matchCard).join(''):DATA.matches.slice(0,4).map(matchCard).join('');
      // 全部赛程
      renderMatches();
      // 领跑者
      const leaders=[...DATA.standings].sort((a,b)=>b.points-a.points||b.goalDifference-a.goalDifference).slice(0,6);
      $('leaders').innerHTML=leaders.map(r=>'<div class="leader-item"><b>'+esc(r.team)+'</b><span style="color:var(--text-muted);font-size:.8rem">'+esc(r.group)+' · '+r.points+'分 · 净胜球 '+sgn(r.goalDifference)+'</span></div>').join('');
      // 积分表
      const srows=[...DATA.standings].sort((a,b)=>String(a.group).localeCompare(String(b.group),'zh-CN')||b.points-a.points||b.goalDifference-a.goalDifference);
      $('standingsTable').innerHTML='<table><thead><tr><th>小组</th><th>球队</th><th>场</th><th>胜</th><th>平</th><th>负</th><th>进球</th><th>失球</th><th>净胜</th><th>积分</th></tr></thead><tbody>'+srows.map(r=>'<tr><td>'+esc(r.group)+'</td><td><strong>'+esc(r.team)+'</strong></td><td>'+r.played+'</td><td>'+r.won+'</td><td>'+r.drawn+'</td><td>'+r.lost+'</td><td>'+r.goalsFor+'</td><td>'+r.goalsAgainst+'</td><td>'+sgn(r.goalDifference)+'</td><td><strong>'+r.points+'</strong></td></tr>').join('')+'</tbody></table>';
      // 红黄牌
      $('disciplineTable').innerHTML='<table><thead><tr><th>比赛</th><th>球队</th><th>球员</th><th>牌类</th><th>分钟</th><th>原因</th></tr></thead><tbody>'+DATA.discipline.map(r=>'<tr><td>'+esc(r.matchId)+'</td><td>'+esc(r.team)+'</td><td>'+esc(r.player)+'</td><td><span class="pill '+(String(r.card).includes('红')?'live':'upcoming')+'">'+esc(r.card)+'</span></td><td>'+esc(r.minute)+'</td><td>'+esc(r.reason||'-')+'</td></tr>').join('')+'</tbody></table>';
      // 筛选器
      const statuses=[...new Set(DATA.matches.map(m=>m.status).filter(Boolean))].sort();
      const groups=[...new Set(DATA.matches.map(m=>m.group).filter(Boolean))].sort();
      const dates=[...new Set(DATA.matches.map(m=>m.date).filter(Boolean))].sort();
      fillSelect('statusFilter',statuses,'全部状态');
      fillSelect('groupFilter',groups,'全部小组');
      fillSelect('dateFilter',dates,'全部日期');
      $('refreshState').textContent='已加载 '+new Date().toLocaleTimeString('zh-CN',{hour12:false});
      // 子渲染
      renderPlayerStats('scorers');
      renderGoalVideos();
      renderVideos();
    }

    function fillSelect(id,vals,first){
      const sel=$(id);const cur=sel.value;
      sel.innerHTML='<option value="">'+first+'</option>'+vals.map(v=>'<option value="'+escA(v)+'">'+esc(v)+'</option>').join('');
      if(vals.includes(cur))sel.value=cur;
    }

    function renderMatches(){
      const q=$('searchBox').value.trim().toLowerCase();
      const status=$('statusFilter').value,group=$('groupFilter').value,date=$('dateFilter').value;
      const rows=DATA.matches.filter(m=>{
        const h=[m.home,m.away,m.venue,m.stage,m.group,m.status,m.time].join(' ').toLowerCase();
        return (!q||h.includes(q))&&(!status||m.status===status)&&(!group||m.group===group)&&(!date||m.date===date);
      });
      $('matchGrid').innerHTML=rows.length?rows.map(matchCard).join(''):'<div class="empty-state"><div class="icon">&#9873;</div><div>没有匹配的比赛。</div></div>';
    }

    // ============ 球员统计 ============
    function renderPlayerStats(tab){
      const c=$('playerStatsContainer');if(!c)return;
      if(tab==='scorers'&&DATA.playerStats&&DATA.playerStats.scorers){
        c.innerHTML=DATA.playerStats.scorers.map((p,i)=>'<div class="player-card"><div class="player-rank'+rankClass(i+1)+'">'+p.rank+'</div><div class="player-info"><div class="player-name">'+esc(p.player)+'</div><div class="player-team">'+esc(p.team)+' · '+p.matches+'场</div></div><div><div class="player-stat-val" style="color:var(--wc-gold)">'+p.goals+'</div><div class="player-stat-lbl">进球</div></div></div>').join('')
      }else if(tab==='assists'&&DATA.playerStats&&DATA.playerStats.assists){
        c.innerHTML=DATA.playerStats.assists.map((p,i)=>'<div class="player-card"><div class="player-rank'+rankClass(i+1)+'">'+p.rank+'</div><div class="player-info"><div class="player-name">'+esc(p.player)+'</div><div class="player-team">'+esc(p.team)+' · '+(p.matches||1)+'场</div></div><div><div class="player-stat-val" style="color:var(--wc-cyan)">'+p.assists+'</div><div class="player-stat-lbl">助攻</div></div></div>').join('')
      }else if(tab==='cards'&&DATA.discipline){
        const cm={};DATA.discipline.forEach(d=>{const k=d.player+'|'+d.team;if(!cm[k])cm[k]={player:d.player,team:d.team,yellow:0,red:0};if(d.card.includes('红'))cm[k].red++;else cm[k].yellow++});
        const data=Object.values(cm).sort((a,b)=>b.red-a.red||b.yellow-a.yellow).slice(0,15);
        c.innerHTML=data.map((p,i)=>'<div class="player-card"><div class="player-rank silver">'+(i+1)+'</div><div class="player-info"><div class="player-name">'+esc(p.player)+'</div><div class="player-team">'+esc(p.team)+'</div></div><div style="display:flex;gap:12px"><div><div class="player-stat-val" style="color:var(--wc-accent)">'+p.red+'</div><div class="player-stat-lbl">红牌</div></div><div><div class="player-stat-val" style="color:var(--wc-gold)">'+p.yellow+'</div><div class="player-stat-lbl">黄牌</div></div></div></div>').join('')
      }
    }

    // ============ 进球视频 ============
    function renderGoalVideos(mf){
      const grid=$('goalVideoGrid'),empty=$('goalVideoEmpty');if(!grid)return;
      let videos=DATA.goalVideos||[];if(mf)videos=videos.filter(v=>v.matchId===mf);
      const fs=$('goalVideoMatchFilter');
      if(fs&&fs.options.length<=1){
        const matches=[...new Set((DATA.goalVideos||[]).map(v=>v.match))];
        fs.innerHTML='<option value="">全部比赛</option>'+matches.map(m=>'<option value="'+escA((DATA.goalVideos||[]).find(v=>v.match===m)?.matchId||'')+'">'+esc(m)+'</option>').join('');
      }
      if(!videos.length){grid.innerHTML='';if(empty)empty.style.display='block';return}
      if(empty)empty.style.display='none';
      grid.innerHTML=videos.map(v=>'<div class="goal-card" onclick="searchGoalVideo(\''+escA(v.query)+'\')"><div class="goal-thumb"><div class="goal-play">&#9654;</div></div><div class="goal-info"><div class="goal-match">'+esc(v.match)+'</div><div class="goal-player">'+esc(v.player)+' ('+esc(v.team)+')</div><div class="goal-detail">第'+esc(v.minute)+'分钟 · '+esc(v.description)+'</div></div></div>').join('');
    }

    function searchGoalVideo(q){window.open('https://www.baidu.com/s?wd='+encodeURIComponent(q+' 世界杯 进球视频'),'_blank')}

    // ============ 视频直播/回放 ============
    function renderVideos(){
      const lms=$('liveMatchSelect'),lw=$('liveVideoWindow'),lm=$('liveVideoMeta'),lh=$('liveHighlightsList');
      const upcoming=DATA.matches.filter(m=>!m.completed&&!m.live).slice(0,10);
      const liveMatch=DATA.matches.find(m=>m.live);
      if(lms){
        let opts='<option value="">自动选择（进行中比赛优先）</option>';
        if(liveMatch)opts+='<option value="'+escA(liveMatch.id)+'" selected>'+esc(liveMatch.home)+' vs '+esc(liveMatch.away)+' （进行中）</option>';
        opts+='<optgroup label="未来比赛">';
        upcoming.forEach(m=>{opts+='<option value="'+escA(m.id)+'">'+esc(m.home)+' vs '+esc(m.away)+' ('+esc(m.time)+')</option>'});
        opts+='</optgroup>';lms.innerHTML=opts;
      }
      if(liveMatch){
        if(lw)lw.innerHTML='<div style="text-align:center;padding:30px 20px;color:var(--text-primary)"><div style="font-size:1.1rem;font-weight:700;margin-bottom:12px">'+esc(liveMatch.home)+' vs '+esc(liveMatch.away)+'</div><div style="font-size:.85rem;color:var(--text-dim);margin-bottom:16px">'+esc(liveMatch.time)+' | '+esc(liveMatch.venue)+'</div><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button onclick="openVideoSource(\''+escA(liveMatch.id)+'\',\'live\')" class="btn btn-primary" style="background:var(--wc-accent);font-size:.85rem;padding:10px 20px">&#128250; 观看直播</button><button onclick="searchMatchNews(\''+escA(liveMatch.home)+'\',\''+escA(liveMatch.away)+'\')" class="btn" style="font-size:.85rem;padding:10px 20px">&#128196; 比赛详情</button></div></div>';
        if(lm)lm.innerHTML='<div style="color:var(--live);font-weight:700">&#9679; LIVE 进行中</div><div>'+esc(liveMatch.home)+' '+(liveMatch.homeScore??0)+' : '+(liveMatch.awayScore??0)+' '+esc(liveMatch.away)+'</div><div style="font-size:.75rem;color:var(--text-dim)">'+esc(liveMatch.venue)+'</div>';
      }else if(lw){
        const y=new Date();y.setDate(y.getDate()-1);const ys=y.toISOString().split('T')[0];
        const ym=DATA.matches.filter(m=>m.completed&&m.date===ys);
        if(ym.length){
          lw.innerHTML='<div style="text-align:center;padding:30px 20px;color:var(--text-primary)"><div style="font-size:1rem;font-weight:700;margin-bottom:8px">暂无进行中的比赛</div><div style="font-size:.8rem;color:var(--text-dim);margin-bottom:16px">可观看昨日（'+ys+'）进球集锦</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'+ym.map(m=>'<button onclick="searchGoalVideo(\''+escA(m.home+' '+m.away+' goal highlights')+'\')" class="btn" style="font-size:.75rem">'+esc(m.home)+' vs '+esc(m.away)+'</button>').join('')+'</div><div style="margin-top:12px"><button onclick="searchGoalVideo(\'World Cup 2026 highlights '+ys+'\')" class="btn">查看所有昨日集锦</button></div></div>';
        }else{
          lw.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--text-dim)"><div style="font-size:3rem;margin-bottom:12px;opacity:.5">&#128250;</div><div>暂无进行中的比赛</div><div style="font-size:.75rem;margin-top:8px">请选择下方未来比赛查看直播预告，或等待比赛开始</div></div>';
        }
        if(lm)lm.innerHTML='<div style="color:var(--text-dim)">等待比赛开始...</div>';
      }
      if(lh&&!liveMatch){
        const pd=DATA.matches.filter(m=>m.completed).slice(-4);
        lh.innerHTML='<div style="padding:8px 0;font-size:.78rem;color:var(--text-muted);font-weight:600">已完赛比赛进球集锦：</div>'+pd.map(m=>'<div class="video-list-item" onclick="searchGoalVideo(\''+escA(m.home+' '+m.away+' all goals highlights')+'\')"><div style="font-weight:700">'+esc(m.home)+' '+(m.homeScore??'')+':'+(m.awayScore??'')+' '+esc(m.away)+'</div><div style="font-size:.7rem;color:var(--text-dim)">'+esc(m.time)+' | 点击查看进球视频</div></div>').join('');
      }else if(lh&&liveMatch){lh.innerHTML=''}

      const rs=$('replaySelect'),cm=DATA.matches.filter(m=>m.completed);
      if(rs){rs.innerHTML='<option value="">选择已完赛比赛</option>'+cm.map(m=>'<option value="'+escA(m.id)+'">'+esc(m.home)+' vs '+esc(m.away)+' ('+esc(m.time)+')</option>').join('');rs.onchange=function(){if(this.value)showReplay(this.value)}}
      if(cm.length&&rs&&!rs.value){showReplay(cm[cm.length-1].id);rs.value=cm[cm.length-1].id}
    }

    document.addEventListener('change',function(e){if(e.target&&e.target.id==='liveMatchSelect'){const mid=e.target.value;if(mid){const m=DATA.matches.find(mm=>mm.id===mid);if(m&&!m.live)showLivePreview(m)}else renderVideos()}});

    function showLivePreview(match){
      const lw=$('liveVideoWindow'),lm=$('liveVideoMeta');if(!match||!lw)return;
      lw.innerHTML='<div style="text-align:center;padding:30px 20px;color:var(--text-primary)"><div style="font-size:1.1rem;font-weight:700;margin-bottom:8px">'+esc(match.home)+' vs '+esc(match.away)+'</div><div style="font-size:.85rem;color:var(--text-dim);margin-bottom:8px">'+esc(match.time)+' | '+esc(match.venue)+'</div><div style="font-size:.78rem;color:var(--wc-gold);margin-bottom:16px">&#9200; 比赛尚未开始，预计直播将在开赛前30分钟上线</div><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button onclick="window.open(\'https://tv.cctv.com/live/\',\'_blank\')" class="btn btn-primary" style="background:var(--wc-blue);font-size:.85rem;padding:10px 20px">&#128250; CCTV5 直播</button><button onclick="window.open(\'https://sports.qq.com/\',\'_blank\')" class="btn" style="font-size:.85rem;padding:10px 20px">腾讯体育</button></div><div style="margin-top:16px"><button onclick="searchGoalVideo(\'yesterday World Cup highlights\')" class="btn" style="font-size:.75rem">查看前一天进球集锦</button></div></div>';
      if(lm)lm.innerHTML='<div style="color:var(--upcoming);font-weight:700">&#9200; 未开赛</div><div>'+esc(match.home)+' vs '+esc(match.away)+'</div><div style="font-size:.75rem;color:var(--text-dim)">'+esc(match.time)+' · '+esc(match.venue)+'</div>';
    }

    function showReplay(matchId){
      const match=DATA.matches.find(m=>m.id===matchId);if(!match)return;
      const w=$('replayVideoWindow'),m=$('replayVideoMeta'),l=$('replayList');
      if(w)w.innerHTML='<div style="text-align:center;padding:30px 20px;color:var(--text-primary)"><div style="font-size:1.1rem;font-weight:700;margin-bottom:12px">'+esc(match.home)+' '+(match.homeScore??'')+' : '+(match.awayScore??'')+' '+esc(match.away)+'</div><div style="font-size:.85rem;color:var(--text-dim);margin-bottom:16px">'+esc(match.time)+' | '+esc(match.venue)+'</div><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button onclick="openVideoSource(\''+escA(match.id)+'\',\'replay\')" class="btn btn-primary" style="background:var(--wc-blue);font-size:.85rem;padding:10px 20px">&#127902; 观看回放</button><button onclick="searchGoalVideo(\''+escA(match.home+' '+match.away+' all goals highlights')+'\')" class="btn" style="font-size:.85rem;padding:10px 20px">&#9917; 进球集锦</button><button onclick="searchMatchNews(\''+escA(match.home)+'\',\''+escA(match.away)+'\')" class="btn" style="font-size:.85rem;padding:10px 20px">&#128240; 相关新闻</button></div></div>';
      if(m)m.innerHTML='<div style="color:var(--done);font-weight:700">&#10003; 已完赛</div><div>最终比分：'+(match.homeScore??'?')+' : '+(match.awayScore??'?')+'</div><div style="font-size:.75rem;color:var(--text-dim)">'+esc(match.venue)+'</div>';
      if(l){const cm=DATA.matches.filter(mm=>mm.completed&&mm.id!==matchId);l.innerHTML=cm.map(mm=>'<div class="video-list-item'+(mm.id===matchId?' active':'')+'" onclick="showReplay(\''+escA(mm.id)+'\')"><div style="font-weight:700">'+esc(mm.home)+' vs '+esc(mm.away)+'</div><div style="font-size:.7rem;color:var(--text-dim)">'+esc(mm.time)+' · '+(mm.homeScore??'?')+':'+(mm.awayScore??'?')+'</div></div>').join('')}
    }

    function openVideoSource(matchId,type){
      const match=DATA.matches.find(m=>m.id===matchId);if(!match)return;
      const modal=$('sourceModal'),title=$('sourceTitle'),sub=$('sourceSubtitle'),grid=$('sourceGrid');
      if(title)title.textContent=(type==='live'?'直播':'回放')+'来源 - '+match.home+' vs '+match.away;
      if(sub)sub.textContent=match.time+' | '+match.venue;
      const sources=[
        {name:'央视频 (CCTV)',url:'https://wap.yangshipin.cn/live/detail.html?pid='+match.id,desc:'官方直播/回放'},
        {name:'央视影音',url:'https://tv.cctv.com/live/',desc:'CCTV5 体育频道'},
        {name:'腾讯体育',url:'https://sports.qq.com/',desc:'可能需要会员'},
        {name:'咪咕视频',url:'https://www.migu.cn/',desc:'中国移动旗下'},
        {name:'新浪体育',url:'https://sports.sina.com.cn/',desc:'文字直播/战报'},
        {name:'百度搜索',url:'https://www.baidu.com/s?wd='+encodeURIComponent(match.home+' vs '+match.away+' '+((match.time||'').split(' ')[0])+' 直播'),desc:'搜索最新直播链接'},
        {name:'Google 搜索',url:'https://www.google.com/search?q='+encodeURIComponent(match.home+' vs '+match.away+' live stream'),desc:'搜索国际直播链接'}
      ];
      if(grid)grid.innerHTML=sources.map(s=>'<div class="source-item" onclick="window.open(\''+escA(s.url)+'\',\'_blank\')"><div class="src-name">'+esc(s.name)+'</div><div class="src-desc">'+esc(s.desc)+'</div></div>').join('');
      if(modal)modal.classList.add('open');
    }

    function searchMatchNews(home,away){window.open('https://www.baidu.com/s?wd='+encodeURIComponent(home+' vs '+away+' 世界杯'),'_blank')}

    // ============ 事件监听 ============
    document.addEventListener('click',function(e){
      const jb=e.target.closest('[data-jump]');
      if(jb){
        document.querySelectorAll('[data-jump]').forEach(b=>b.classList.remove('active'));
        jb.classList.add('active');
        const t=document.getElementById(jb.dataset.jump);
        if(t){
          const headerH=document.querySelector('header')?.offsetHeight||60;
          const top=t.getBoundingClientRect().top+window.pageYOffset-headerH-8;
          window.scrollTo({top,behavior:'smooth'});
        }
      }
      const tb=e.target.closest('#playerTabs .tab-btn');
      if(tb){document.querySelectorAll('#playerTabs .tab-btn').forEach(b=>b.classList.remove('active'));tb.classList.add('active');renderPlayerStats(tb.dataset.tab)}
    });

    ['searchBox','statusFilter','groupFilter','dateFilter'].forEach(id=>{$(id).addEventListener('input',renderMatches)});
    $('resetFilters').addEventListener('click',()=>{['searchBox','statusFilter','groupFilter','dateFilter'].forEach(id=>{$(id).value=''});renderMatches()});
    $('refreshBtn').addEventListener('click',async()=>{$('refreshState').textContent='刷新中...';const nd=await loadDataFromNetwork();if(nd){DATA=processData(nd);dataSource='WorldCup26 实时数据（手动刷新）';updateDataBar();renderAll();resetCountdown();$('refreshState').textContent='已刷新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false})}else{renderAll();$('refreshState').textContent='刷新失败（使用本地缓存） '+new Date().toLocaleTimeString('zh-CN',{hour12:false})}});
    $('refreshLiveBtn').addEventListener('click',()=>{renderVideos()});
    $('searchReplayBtn').addEventListener('click',()=>{const s=$('replaySelect');if(s&&s.value)showReplay(s.value)});
    $('goalVideoMatchFilter').addEventListener('change',function(){renderGoalVideos(this.value)});

    const sc=$('sourceClose');if(sc)sc.onclick=function(){$('sourceModal').classList.remove('open')};
    const sm=$('sourceModal');if(sm)sm.addEventListener('click',function(e){if(e.target===sm)sm.classList.remove('open')});

    // Mobile menu toggle
    const mb=$('mobileMenuBtn'),nl=$('navLinks');
    if(mb&&nl){mb.addEventListener('click',function(e){e.stopPropagation();nl.classList.toggle('open')})}
    // Close mobile menu when tapping outside
    document.addEventListener('click',function(e){if(nl&&!e.target.closest('header')&&window.innerWidth<=600){nl.classList.remove('open')}})

    // ============ 初始化 ============
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initData)}else{initData()}
  </script>
</body>
</html>
